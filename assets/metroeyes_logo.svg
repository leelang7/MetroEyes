<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 480" width="480" height="480">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1d24"/>
      <stop offset="100%" stop-color="#2d3142"/>
    </linearGradient>
    <linearGradient id="eyeGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dd3d3"/>
      <stop offset="100%" stop-color="#5fb8b8"/>
    </linearGradient>
    <radialGradient id="pupilGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7dd3d3" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#7dd3d3" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c33764"/>
      <stop offset="100%" stop-color="#f0b46a"/>
    </linearGradient>
  </defs>

  <!-- 배경 라운드 정사각형 -->
  <rect x="0" y="0" width="480" height="480" rx="84" ry="84" fill="url(#bgGrad)"/>

  <!-- BEV 그리드 (배경 격자) - 도시 평면 시각화 -->
  <g stroke="#7dd3d3" stroke-width="1" opacity="0.10">
    <line x1="60" y1="120" x2="420" y2="120"/>
    <line x1="60" y1="180" x2="420" y2="180"/>
    <line x1="60" y1="240" x2="420" y2="240"/>
    <line x1="60" y1="300" x2="420" y2="300"/>
    <line x1="60" y1="360" x2="420" y2="360"/>
    <line x1="120" y1="60" x2="120" y2="420"/>
    <line x1="180" y1="60" x2="180" y2="420"/>
    <line x1="240" y1="60" x2="240" y2="420"/>
    <line x1="300" y1="60" x2="300" y2="420"/>
    <line x1="360" y1="60" x2="360" y2="420"/>
  </g>

  <!-- 호모그래피 사다리꼴 (BEV 변환 시각화) -->
  <path d="M 165 145 L 315 145 L 405 335 L 75 335 Z"
        fill="none" stroke="#c33764" stroke-width="2.5" stroke-dasharray="6 4" opacity="0.55"/>

  <!-- 눈 모양 (Eyes 메타포) -->
  <ellipse cx="240" cy="240" rx="160" ry="100" fill="none" stroke="url(#eyeGrad)" stroke-width="6"/>

  <!-- 동공 (사람·차량 트래킹 점) -->
  <circle cx="240" cy="240" r="56" fill="url(#pupilGlow)"/>
  <circle cx="240" cy="240" r="36" fill="#7dd3d3"/>
  <circle cx="240" cy="240" r="14" fill="#04060a"/>

  <!-- 점유 분포 점들 (BEV 평면 상의 사람) -->
  <g fill="#7dd3d3">
    <circle cx="120" cy="200" r="3.5"/>
    <circle cx="155" cy="280" r="3.5"/>
    <circle cx="190" cy="180" r="3.5"/>
    <circle cx="350" cy="200" r="3.5"/>
    <circle cx="320" cy="290" r="3.5"/>
    <circle cx="390" cy="260" r="3.5"/>
  </g>

  <!-- 위쪽 액센트 — 지하철 칸 라인 -->
  <rect x="160" y="80" width="160" height="6" rx="3" fill="url(#accentGrad)"/>
  <!-- 아래쪽 액센트 — 도로/플랫폼 라인 -->
  <rect x="160" y="394" width="160" height="6" rx="3" fill="url(#accentGrad)" opacity="0.7"/>

  <!-- "M" 모노그램 (Metro) 좌상단 -->
  <text x="55" y="84" font-family="'Pretendard','Inter',sans-serif"
        font-size="40" font-weight="800" fill="#7dd3d3" letter-spacing="-2">M</text>

  <!-- "E" 모노그램 (Eyes) 우하단 -->
  <text x="395" y="430" font-family="'Pretendard','Inter',sans-serif"
        font-size="40" font-weight="800" fill="#c33764" letter-spacing="-2">E</text>
</svg>
