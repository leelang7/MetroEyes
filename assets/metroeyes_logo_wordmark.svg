<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="eyeGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7dd3d3"/>
      <stop offset="100%" stop-color="#5fb8b8"/>
    </linearGradient>
    <linearGradient id="accentGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#c33764"/>
      <stop offset="100%" stop-color="#f0b46a"/>
    </linearGradient>
  </defs>

  <!-- 아이콘 (좌측) -->
  <g transform="translate(20, 30)">
    <rect x="0" y="0" width="140" height="140" rx="28" ry="28" fill="#1a1d24"/>
    <!-- 그리드 -->
    <g stroke="#7dd3d3" stroke-width="0.8" opacity="0.10">
      <line x1="20" y1="35" x2="120" y2="35"/>
      <line x1="20" y1="70" x2="120" y2="70"/>
      <line x1="20" y1="105" x2="120" y2="105"/>
      <line x1="35" y1="20" x2="35" y2="120"/>
      <line x1="70" y1="20" x2="70" y2="120"/>
      <line x1="105" y1="20" x2="105" y2="120"/>
    </g>
    <!-- 호모그래피 사다리꼴 -->
    <path d="M 48 42 L 92 42 L 118 98 L 22 98 Z"
          fill="none" stroke="#c33764" stroke-width="1.3" stroke-dasharray="3 2" opacity="0.55"/>
    <!-- 눈 -->
    <ellipse cx="70" cy="70" rx="48" ry="29" fill="none" stroke="url(#eyeGrad2)" stroke-width="2.4"/>
    <circle cx="70" cy="70" r="11" fill="#7dd3d3"/>
    <circle cx="70" cy="70" r="4" fill="#04060a"/>
    <!-- 점유 점들 -->
    <g fill="#7dd3d3">
      <circle cx="32" cy="58" r="1.5"/>
      <circle cx="105" cy="58" r="1.5"/>
      <circle cx="42" cy="84" r="1.5"/>
      <circle cx="98" cy="84" r="1.5"/>
    </g>
  </g>

  <!-- 워드마크 -->
  <g transform="translate(190, 0)">
    <text x="0" y="105" font-family="'Pretendard','Inter','Segoe UI',sans-serif"
          font-size="76" font-weight="800" fill="#1a1d24" letter-spacing="-3">Metro</text>
    <text x="240" y="105" font-family="'Pretendard','Inter','Segoe UI',sans-serif"
          font-size="76" font-weight="300" fill="#7dd3d3" letter-spacing="-3">Eyes</text>

    <!-- 액센트 라인 -->
    <rect x="0" y="120" width="380" height="3" rx="1.5" fill="url(#accentGrad2)"/>

    <!-- 태그라인 -->
    <text x="0" y="148" font-family="'Pretendard','Inter','Segoe UI',sans-serif"
          font-size="14" font-weight="500" fill="#6a7385" letter-spacing="2.5">
      도시 교통 실시간 BEV 점유 인사이트
    </text>
  </g>
</svg>
