name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  python-syntax:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Syntax check (ast.parse all .py)
        run: |
          python -c "
          import ast, pathlib, sys
          errors = []
          for p in pathlib.Path('.').rglob('*.py'):
              if any(part in {'.venv', 'build', 'node_modules', 'outputs', '__pycache__'} for part in p.parts):
                  continue
              try: ast.parse(p.read_text(encoding='utf-8'))
              except SyntaxError as e: errors.append(f'{p}: {e}')
          if errors:
              print('\n'.join(errors)); sys.exit(1)
          print('✅ All Python syntax OK')
          "

  lite-server-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install minimal deps
        run: pip install --no-cache-dir websockets
      - name: Smoke test — import lite_server
        run: |
          python -c "import sys; sys.path.insert(0, '.'); from src.cv import lite_server; print('✅ lite_server import OK')"

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Dockerfile
        run: docker build -t metroeyes:ci .
      - name: Smoke run (5s)
        run: |
          docker run -d --name metroeyes-ci -p 8765:8765 metroeyes:ci
          sleep 5
          curl -fsS http://localhost:8765/health > /dev/null || (docker logs metroeyes-ci; exit 1)
          docker stop metroeyes-ci
          echo "✅ Docker /health OK"

  frontend-html-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check frontend html files exist + non-empty
        run: |
          for f in frontend/index.html frontend/demo.html frontend/pitch.html frontend/admin.html frontend/operator_web/index.html frontend/operator_web/bus.html frontend/operator_web/realbev.html frontend/operator_web/ad_pricing.html frontend/passenger_app/index.html frontend/passenger_app/onboard.html; do
            test -s "$f" || (echo "❌ Missing or empty: $f" && exit 1)
          done
          echo "✅ All 10 frontend pages exist + non-empty"

  openapi-spec-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pyyaml + pytest
        run: pip install --no-cache-dir pyyaml pytest
      - name: Run OpenAPI spec regression tests
        run: |
          python -m pytest tests/test_openapi_spec.py -v
          echo "✅ OpenAPI spec — 9 endpoints + IDEA-7/8 enum + policy_summary breakdown all valid"

  policy-roi-v3-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install numpy + pytest
        run: pip install --no-cache-dir numpy pytest
      - name: Run ROI v3 KPI regression tests
        run: |
          python -m pytest tests/test_policy_roi_v3.py -v
          echo "✅ ROI v3 — 1,393억/year, 347x, 473M min/year, 2호선 157M, 134역 모두 검증"

  eda-dispersion-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: pip install --no-cache-dir pytest
      - name: Run dispersion EDA report regression tests
        run: |
          python -m pytest tests/test_eda_dispersion.py -v
          echo "✅ Dispersion EDA — σ −9% / peak −13.5% / offpeak +5.6% / ratio 1.78→1.46 모두 검증"

  eda-od-transfer-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: pip install --no-cache-dir pytest
      - name: Run OD/transfer EDA report regression tests
        run: |
          python -m pytest tests/test_eda_od_transfer.py -v
          echo "✅ OD/Transfer EDA — 삼성 12.4x 출근 / 충무로 +1.56 환승 / 연신내 +1.44 모두 검증"

  bonus-krw-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install websockets + pytest
        run: pip install --no-cache-dir websockets pytest
      - name: Run differential bonus tier regression tests
        run: |
          python -m pytest tests/test_bonus_krw.py -v
          echo "✅ Differential bonus — basic ₩200 / +₩100 OD / +₩200 transfer + transfer outranks OD"

  figures-present-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install pytest
        run: pip install --no-cache-dir pytest
      - name: Run figs/ presence regression tests
        run: |
          python -m pytest tests/test_figures_present.py -v
          echo "✅ pitch.html 참조 figs/* 모두 존재 + 비어있지 않음"
