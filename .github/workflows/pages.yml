name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 정적 파일만 모아서 site/ 디렉토리에 배치
      - name: Stage site
        run: |
          mkdir -p site
          cp -r frontend site/frontend
          # frontend/index.html을 루트로 사용 — 상대경로를 frontend/ prefix로 수정
          python3 - << 'PYEOF'
          import re
          content = open('frontend/index.html', encoding='utf-8').read()
          # 상대경로 href/src를 frontend/ prefix로 수정 (http://, https://, data:, # 제외)
          def fix_href(m):
              val = m.group(1)
              if re.match(r'(https?://|data:|#|//)', val):
                  return f'href="{val}"'
              return f'href="frontend/{val}"'
          def fix_src(m):
              val = m.group(1)
              if re.match(r'(https?://|data:|#|//)', val):
                  return f'src="{val}"'
              return f'src="frontend/{val}"'
          content = re.sub(r'href="([^"]+)"', fix_href, content)
          content = re.sub(r'src="([^"]+)"', fix_src, content)
          open('site/index.html', 'w', encoding='utf-8').write(content)
          PYEOF

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
