name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ?뺤쟻 ?뚯씪留?紐⑥븘??site/ ?붾젆?좊━??諛곗튂
      - name: Stage site
        run: |
          mkdir -p site
          cp -r frontend site/frontend
          # 猷⑦듃 吏꾩엯? ?쒕? PWA ?먮뒗 ?댁쁺??肄섏넄 ??媛꾨떒 index.html 異붽?
          cat > site/index.html << 'HTML'
          <!doctype html>
          <html lang="ko">
          <head>
          <meta charset="utf-8">
          <title>MetroEyes ???쇱씠釉??곕え</title>
          <meta name="theme-color" content="#04060a">
          <style>
            html,body { margin:0; height:100%; background:#04060a; color:#e8edf5;
              font-family:"Inter",-apple-system,"Segoe UI","Malgun Gothic",system-ui,sans-serif;
              display:flex; align-items:center; justify-content:center; }
            .wrap { max-width:520px; padding:32px; text-align:left; }
            h1 { font-size:36px; font-weight:200; letter-spacing:-1px; margin:0 0 6px; }
            h1 b { color:#7dd3d3; font-weight:500; }
            p.sub { color:#8e98ac; font-size:14px; margin:0 0 28px; line-height:1.5; }
            a.card { display:block; padding:14px 18px; background:#0a0d14;
              border:1px solid rgba(255,255,255,0.08); border-radius:12px;
              color:#e8edf5; text-decoration:none; margin-bottom:10px;
              transition:all 0.2s; }
            a.card:hover { border-color:rgba(125,211,211,0.4); transform:translateX(2px); }
            a.card .label { color:#7dd3d3; font-size:11px; letter-spacing:1.4px;
              text-transform:uppercase; margin-bottom:4px; }
            a.card .name { font-size:16px; font-weight:500; }
            a.card .desc { color:#8e98ac; font-size:12px; margin-top:2px; }
            footer { margin-top:32px; font-size:11px; color:#6b768a; letter-spacing:1.2px; }
          </style>
          </head>
          <body>
          <div class="wrap">
            <h1>MetroEyes <b>쨌</b></h1>
            <p class="sub">?뚯뒳?쇨? ?꾨줈瑜?BEV濡?蹂대벏, ?꾩떆 援먰넻 ?꾩껜瑜?蹂몃떎.<br>
              ?먯껜 CV + 4以??곗씠???듯빀 ?쇱씠釉??곕え.</p>
            <a class="card" href="frontend/operator_web/realbev.html">
              <div class="label">Operator 쨌 3D BEV</div>
              <div class="name">?ㅼ떆媛?移대찓??BEV (Three.js)</div>
              <div class="desc">11移대뱶 ? ?듯빀 + ML 24h ?덉륫 + ?뺥솗??/div>
            </a>
            <a class="card" href="frontend/operator_web/index.html">
              <div class="label">Operator 쨌 吏?섏쿋</div>
              <div class="name">10???몄꽦 BEV</div>
              <div class="desc">4以?fusion-strip + ?꾧퀎 遺꾩궛 ?덈궡</div>
            </a>
            <a class="card" href="frontend/operator_web/bus.html">
              <div class="label">Operator 쨌 踰꾩뒪</div>
              <div class="name">?뺣쪟??BEV</div>
            </a>
            <a class="card" href="frontend/passenger_app/index.html">
              <div class="label">Citizen PWA</div>
              <div class="name">?쒕? ??(紐⑤컮??</div>
              <div class="desc">GPS 쨌 移몃퀎 ?먯쑀??쨌 ?멸뎄 chip 쨌 媛뺤닔 ?덈낫</div>
            </a>
            <footer>BACKEND wss://app.allthatai.kr</footer>
          </div>
          </body>
          </html>
          HTML

      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - id: deployment
        uses: actions/deploy-pages@v4
