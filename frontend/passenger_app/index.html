const canvas = document.getElementById('bev');

function makeSim() {
  if (sim) {
    // canvas???숈씪?섎땲 invalidate ???덈줈 留뚮뱺??    sim = null;
  }
  const cfg = VEHICLES[mode];
  canvas.className = cfg.bevCanvasClass;
  sim = BEVEngine.createSim({
    canvas,
    capacity: cfg.capacity,
    cycleDur: cfg.cycleDur,
    layoutFn: cfg.layoutFn,
    decorate: cfg.decorate,
    compact: true,
  });
}

function buildOptions(hour) {
  const cfg = VEHICLES[mode];
  const avg = model.trainOccupancyAt(hour, cfg.label.cluster);
  if (mode === 'subway') {
    return model.carOccupancies(avg, cfg.count, hour * 13 + 7).map((occ, i) => ({
      idx: i, label: `${i + 1}?몄감`, occ, eta: 70 + i * 1, // initial ETA in seconds (just 1踰덉㎏ 李?
    }));
  } else {
    const r = ((seed) => { let s = seed; return () => { s = (s * 9301 + 49297) % 233280; return s / 233280; }; })(hour * 17 + 3);
    return Array.from({ length: cfg.count }, (_, i) => {
      const noise = (r() - 0.5) * 0.20;
      const occ = Math.max(0.05, Math.min(1.05, avg * 0.92 + noise));
      const eta = i === 0 ? Math.max(1, Math.round(r() * 3)) : Math.round((i + 1) * 4 + r() * 2);
      return { idx: i, label: `${i + 1}?쒖쐞`, occ, eta: eta * 60 };
    });
  }
}

let options = [];
function pickRecommended() {
  // ?먯쑀??媛????? ?듭뀡
  let bi = 0; let bv = options[0].occ;
  for (let i = 1; i < options.length; i++) {
    if (options[i].occ < bv) { bv = options[i].occ; bi = i; }
  }
  return bi;
}

function fmtETA(seconds) {
  if (seconds < 60) return `${seconds}<span class="unit">珥?/span>`;
  const m = Math.floor(seconds / 60);
  const s = seconds % 60;
  return `${m}<span class="unit">遺?/span>${s > 0 ? ' ' + s + '<span class="unit">珥?/span>' : ''}`;
}

function renderCompare() {
  const cfg = VEHICLES[mode];
  const root = document.getElementById('compare-rows');
  root.innerHTML = '';
  options.forEach((opt, i) => {
    if (i === selected) return;
    const cls = opt.occ > 0.85 ? 'crit' : opt.occ > 0.65 ? 'warn' : '';
    const verdictCls = opt.occ < options[selected].occ ? 'go' : (opt.occ > 0.85 ? 'no' : '');
    const verdictText = opt.occ < options[selected].occ ? '???쒖궛' : (opt.occ > 0.85 ? '鍮꾩텛' : '鍮꾩듂');
    const whenText = mode === 'subway'
      ? (i === 0 ? '吏湲? : `${i}????)
      : (`${Math.round(opt.eta / 60)}遺???);
    const row = document.createElement('div');
    row.className = 'compare-row';
    row.innerHTML = `
      <span class="when">${whenText}</span>
      <div class="bar ${cls}"><div style="width: ${Math.min(100, opt.occ * 100)}%"></div></div>
      <span class="pct">${Math.round(opt.occ * 100)}%</span>
      <span class="verdict ${verdictCls}">${verdictText}</span>
    `;
    root.appendChild(row);
  });
}

function applyAll() {
  const cfg = VEHICLES[mode];
  const hour = +document.getElementById('hour').value;
  document.getElementById('hourlabel').textContent = hour + '??;
  const minute = String(22).padStart(2, '0');  // demo
  document.getElementById('ctx-time').textContent = `${String(hour).padStart(2, '0')}:${minute}`;
  document.getElementById('ctx-name').textContent = cfg.label.station;
  document.getElementById('ctx-meta').textContent = cfg.label.line;

  options = buildOptions(hour);
  selected = pickRecommended();
  const opt = options[selected];

  // Decision card
  document.getElementById('d-label').textContent = mode === 'subway' ? '沅뚯옣 ?묒듅 移? : '沅뚯옣 ?묒듅 李⑤웾';
  document.getElementById('d-car').textContent = opt.label;
  document.getElementById('d-pct').textContent = Math.round(opt.occ * 100);
  const trainAvg = model.trainOccupancyAt(hour, cfg.label.cluster);
  document.getElementById('d-why').innerHTML = mode === 'subway'
    ? `?몄꽦 ?됯퇏 <b>${Math.round(trainAvg * 100)}%</b>蹂대떎 ?쒖궛. ${cfg.label.station} ${cfg.label.line}.`
    : `?몄꽑 ?됯퇏 <b>${Math.round(trainAvg * 100)}%</b>蹂대떎 ?쒖궛. ${opt.eta < 5 * 60 ? '諛붾줈 ?꾩갑 ?덉젙' : '?쎄컙 ?湲?媛移?}.`;

  // Approach
  document.getElementById('ap-head').textContent = cfg.approachHead;
  document.getElementById('ap-text').innerHTML = cfg.approachText(opt.idx);

  // ETA
  document.getElementById('eta-num').innerHTML = fmtETA(opt.eta);

  // Mini BEV title
  document.getElementById('mini-title').textContent = opt.label;

  // Sim
  if (sim) {
    sim.setTargetOccupancy(opt.occ);
    sim.forceRebuild(opt.occ);
  }

  // Compare
  renderCompare();

  // Alert (over capacity)
  document.getElementById('alert').classList.toggle('show', opt.occ >= 0.92);

  // CTA destination
  document.getElementById('cta').onclick = () => {
    // (I2) ?ы쉶???꾪뙥????沅뚯옣 移??됯퇏怨쇱쓽 李⑥씠瑜?"?덇컧"?쇰줈 ?꾩쟻
    try {
      const avg = options.reduce((a, b) => a + b.occ, 0) / options.length;
      const savedPct = Math.max(0, Math.round((avg - opt.occ) * 100));
      const myKey = 'metroeyes_my_impact';
      const my = JSON.parse(localStorage.getItem(myKey) || '{"n":0,"saved":0}');
      my.n += 1; my.saved += savedPct;
      localStorage.setItem(myKey, JSON.stringify(my));
      // backend??broadcast (?덉쑝硫?
      if (window.LIVE_WS && window.LIVE_WS.readyState === 1) {
        window.LIVE_WS.send(JSON.stringify({
          type: 'impact_log',
          station: document.getElementById('ctx-name').textContent,
          car: opt.label,
          saved_pct: savedPct,
        }));
      }
    } catch {}
    const params = new URLSearchParams({ mode, idx: opt.idx, hour });
    location.href = `onboard.html?${params.toString()}`;
  };
}

function setMode(m) {
  if (mode === m) return;
  mode = m;
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.mode === m));

  const dt = Math.min(0.05, (now - lastT) / 1000);

async function askCitizen() {
  const q = aInput.value.trim();
  if (!q) return;
  aSend.disabled = true;
  aAnswer.textContent = '?앷컖 以?..';
  const resp = await LLMAssistant.callLLM(q, 'citizen');
  await LLMAssistant.streamTo(aAnswer, resp);
  aSend.disabled = false;
  if (a11yOn) {
    SF.speak(resp.replace(/[?쉯?쉶?썤?뫀쨌]/g, ''), 'ko-KR');
  }
}

aInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') askCitizen(); });

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  const rec = new SR();
  rec.lang = 'ko-KR';
  rec.continuous = false;
  rec.interimResults = false;
  let listening = false;
  aMic.addEventListener('click', () => {
    if (listening) { rec.stop(); return; }
    try { rec.start(); listening = true; aMic.classList.add('listening'); } catch {}
  });
  rec.addEventListener('result', (ev) => {
    aInput.value = ev.results[0][0].transcript;
    askCitizen();
  });
  rec.addEventListener('end', () => { listening = false; aMic.classList.remove('listening'); });
  rec.addEventListener('error', () => { listening = false; aMic.classList.remove('listening'); });
} else {

const LIVE = (() => {
  const stations = [
    { name: '?좎떎', line: 2, lat: 37.5133, lon: 127.1000, poi: '?좎떎?? },
    { name: '媛뺣궓', line: 2, lat: 37.4980, lon: 127.0276, poi: '媛뺣궓?? },
    { name: '?띾??낃뎄', line: 2, lat: 37.5572, lon: 126.9244, poi: '?띾? 愿愿묓듅援? },
    { name: '?쒖껌', line: 2, lat: 37.5642, lon: 126.9778, poi: '愿묓솕臾맞룸뜒?섍턿' },
    { name: '?쒖슱??, line: 1, lat: 37.5547, lon: 126.9707, poi: '?쒖슱?? },
    { name: '愿묓솕臾?, line: 5, lat: 37.5717, lon: 126.9766, poi: '愿묓솕臾맞룸뜒?섍턿' },
    { name: '醫낅줈3媛', line: 1, lat: 37.5717, lon: 126.9914, poi: '醫낅줈쨌泥?퀎 愿愿묓듅援? },
    { name: '?좎큿', line: 2, lat: 37.5556, lon: 126.9362, poi: '?좎큿쨌?대??? },
    { name: '?щ떦', line: 2, lat: 37.4766, lon: 126.9817, poi: '?щ떦?? },
    { name: '嫄대??낃뎄', line: 2, lat: 37.5403, lon: 127.0703, poi: '嫄대??낃뎄?? },
    { name: '源?ш났??, line: 5, lat: 37.5615, lon: 126.8014, poi: '源?ш났?? },
  ];
  function haversineKm(a, b) {
    const r = 6371, toRad = (d) => d * Math.PI / 180;
    const dLat = toRad(b.lat - a.lat), dLon = toRad(b.lon - a.lon);
    const x = Math.sin(dLat/2) ** 2 +
      Math.cos(toRad(a.lat)) * Math.cos(toRad(b.lat)) * Math.sin(dLon/2) ** 2;
    return r * 2 * Math.atan2(Math.sqrt(x), Math.sqrt(1 - x));
  }
  function nearest(lat, lon) {
    let best = stations[0], bk = Infinity;
    for (const s of stations) {
      const k = haversineKm({lat,lon}, s);
      if (k < bk) { bk = k; best = s; }
    }
    return { station: best, km: bk };
  }
  function pickWsUrl() {
    const p = new URLSearchParams(location.search).get('ws');
    if (p) return p;
    const saved = localStorage.getItem('subwaybev_ws');
    if (saved) return saved;
    if (location.hostname.endsWith('ngrok-free.dev')) {
      return `wss://${location.host}`;
    }
    // GitHub Pages ???몃? ?몄뒪????ngrok ?곴뎄 ?꾨찓?몄쑝濡?吏곸젒
    if (location.hostname.endsWith('github.io') || location.protocol === 'https:') {
      return 'wss://app.allthatai.kr';
    }
    return 'ws://localhost:8765';
  }

  let ws = null;
  let retryT = null;
  let liveBev = null;       // 留덉?留?BEV ?섏씠濡쒕뱶
  let liveArrival = null;   // 留덉?留?arrival ?묐떟
  let livePpltn = null;     // 留덉?留??멸뎄 ?묐떟
  let curStation = stations[0]; // 湲곕낯 ?좎떎
  let arrivalPoll = null, ppltnPoll = null, cdPoll = null;

  const badge = document.getElementById('live-badge');
  const label = document.getElementById('live-label');
  function setBadge(state, text) {
    badge.classList.remove('connected','connecting','error');
    if (state) badge.classList.add(state);
    label.textContent = text;
  }

  function applyOcc() {
    if (!liveBev || !options || options.length === 0) return;
    if (mode !== 'subway') return; // bus???쒕? ?좎?
    // bev_x quantile 10 遺꾪븷 ??移몃퀎 person 移댁슫?? ?뺤썝 20紐?媛??    const bins = new Array(VEHICLES.subway.count).fill(0);
    for (const t of (liveBev.tracks || [])) {
      if (t.class !== 'person') continue;
      const x = +t.bev_x;
      if (!isFinite(x)) continue;
      let i = Math.floor(x * bins.length);
      if (i < 0) i = 0; if (i >= bins.length) i = bins.length - 1;
      bins[i]++;
    }
    const cap = 20;
    if (liveBev.tracks && liveBev.tracks.some(t => t.class === 'person')) {
      options = options.map((o, i) => ({ ...o, occ: Math.min(1.05, bins[i] / cap) }));
      // ETA ?곸슜 (?쇱씠釉??꾩갑)
      if (liveArrival && liveArrival.items && liveArrival.items.length) {
        let bestEta = null;
        for (const r of liveArrival.items) {
          let s = (typeof r.barvlDt === 'number' && r.barvlDt > 0) ? r.barvlDt : null;
          if (s == null && (r.arvlCd === 1 || r.arvlCd === 5)) s = 0;
          if (s != null && (bestEta == null || s < bestEta)) bestEta = s;
        }
        if (bestEta != null) {
          options = options.map(o => ({ ...o, eta: bestEta }));
        }
      }
      selected = pickRecommended();
      // ?붾㈃ 媛깆떊 (applyAll ?쇰? ?ъ궗????DOM留??낅뜲?댄듃)
      const opt = options[selected];
      document.getElementById('d-car').textContent = opt.label;
      document.getElementById('d-pct').textContent = Math.round(opt.occ * 100);
      const liveAvg = options.reduce((a,b) => a + b.occ, 0) / options.length;
      const personN = liveBev.tracks.filter(t => t.class === 'person').length;
      document.getElementById('d-why').innerHTML =
        `?ㅼ륫 ?됯퇏 <b>${Math.round(liveAvg * 100)}%</b>蹂대떎 ?쒖궛. ?쇱씠釉?移대찓??${personN}紐?寃異?`;
      document.getElementById('eta-num').innerHTML = fmtETA(opt.eta);
      document.getElementById('mini-title').textContent = opt.label;
      if (sim) { sim.setTargetOccupancy(opt.occ); sim.forceRebuild(opt.occ); }
      renderCompare();
    }
  }

  function applyPopulation(p) {
    const strip = document.getElementById('ppltn-strip');
    if (!p || p.error || p.ppltn_max == null) { strip.hidden = true; return; }
    const mid = Math.round(((p.ppltn_min || 0) + (p.ppltn_max || 0)) / 2);
    document.getElementById('ppltn-area').textContent = p.area_nm || curStation.poi;
    const numStr = mid >= 10000 ? `${(mid/10000).toFixed(1)}留뚮챸` :
                   mid >= 1000 ? `${(mid/1000).toFixed(1)}K紐? : `${mid}紐?;
    document.getElementById('ppltn-num').textContent = numStr;
    const lvl = p.congest_lvl || '?';
    const lvlEl = document.getElementById('ppltn-lvl');
    lvlEl.textContent = lvl;
    lvlEl.className = 'lvl ' + (
      lvl === '遺먮퉼' ? 'busy' :
      lvl === '?쎄컙 遺먮퉼' ? 'bit-busy' :
      lvl === '蹂댄넻' ? 'normal' : 'relax'
    );
    strip.hidden = false;
  }

  function send(o) { if (ws && ws.readyState === 1) ws.send(JSON.stringify(o)); }
  function queryArrival() { send({ type: 'arrival_query', stationName: curStation.name, line: curStation.line }); }
  function queryPpltn() { if (curStation.poi) send({ type: 'population_query', poi: curStation.poi }); }
  function queryCitydata() { if (curStation.poi) send({ type: 'citydata_query', poi: curStation.poi }); }

  function applyCitydata(j) {
    if (j.error) return;
    const chips = document.getElementById('context-chips');
    let any = false;
    // ?좎뵪 + 媛뺤닔 ?쒖떆 (?꾩옱)
    if (j.temp != null) {
      const cl = j.temp >= 25 ? 'warm' : j.temp <= 5 ? 'cold' : '';
      const el = document.getElementById('chip-weather');
      el.className = 'chip ' + cl;
      const rainNow = (j.precpt_type && j.precpt_type !== '?놁쓬' && j.precpt_type !== '-') ? ` ${j.precpt_type}` : '';
      document.getElementById('chip-weather-v').textContent = `${j.temp.toFixed(1)}째${rainNow}`;
      document.getElementById('chip-weather-sub').textContent = j.sensible_temp != null ? `泥닿컧 ${j.sensible_temp.toFixed(0)}째` : '';
      el.hidden = false; any = true;
    }
    // 怨듦린吏?    if (j.air_idx) {
      const lvl = j.air_idx;
      const cls = (lvl === '醫뗭쓬') ? 'air-good' : (lvl === '蹂댄넻') ? 'air-good'
                : (lvl === '?섏겏') ? 'air-mid' : 'air-bad';
      const el = document.getElementById('chip-air');
      el.className = 'chip ' + cls;
      document.getElementById('chip-air-v').textContent = lvl;
      const pm25 = j.pm25 != null ? `PM2.5 ${j.pm25}` : '';
      const pm10 = j.pm10 != null ? `PM10 ${j.pm10}` : '';
      document.getElementById('chip-air-sub').textContent = [pm25, pm10].filter(Boolean).join(' 쨌 ');
      el.hidden = false; any = true;
    }
    // ?먯쇅??(?믪쓬/留ㅼ슦 ?믪쓬???뚮쭔)
    if (j.uv_idx && (j.uv_idx === '?믪쓬' || j.uv_idx === '留ㅼ슦 ?믪쓬' || (j.uv_lvl ?? 0) >= 6)) {
      const cls = j.uv_idx === '留ㅼ슦 ?믪쓬' || (j.uv_lvl ?? 0) >= 9 ? 'uv-veryhigh' : 'uv-high';
      const el = document.getElementById('chip-uv');
      el.className = 'chip ' + cls;
      document.getElementById('chip-uv-v').textContent = j.uv_idx;
      el.hidden = false; any = true;
    } else {
      document.getElementById('chip-uv').hidden = true;
    }
    const bikeShared = (j.sbike || []).reduce((a, b) => a + (b.shared || 0), 0);
    if (bikeShared > 0 || (j.sbike || []).length > 0) {
      document.getElementById('chip-bike-v').textContent = bikeShared;
      document.getElementById('chip-bike').hidden = false; any = true;
    }
    const prkAvail = (j.parking || []).reduce((a, b) => a + Math.max(0, (b.cap || 0) - (b.cur || 0)), 0);
    if (prkAvail > 0) {
      document.getElementById('chip-parking-v').textContent = prkAvail;
      document.getElementById('chip-parking').hidden = false; any = true;
    }
    if (j.road_avg_speed != null) {
      document.getElementById('chip-road-v').textContent = j.road_avg_speed.toFixed(0);
      document.getElementById('chip-road').hidden = false; any = true;
    }
    chips.hidden = !any;

    // 媛뺤닔 ?덈낫 諛곕꼫
    const rainEl = document.getElementById('rain-banner');
    const rainText = document.getElementById('rain-banner-text');
    if (j.rain_first && j.rain_first.dt) {
      const dt = j.rain_first.dt;  // YYYYMMDDHHMM
      const hh = dt.length >= 12 ? dt.substring(8, 10) : '?';
      const tp = j.rain_first.type;
      rainText.innerHTML = `<b>${hh}??/b>遺??<b>${tp}</b> ?덈낫 ???곗궛 梨숆린?몄슂`;
      rainEl.hidden = false;
    } else {
      rainEl.hidden = true;
    }

    // ?덉쟾 ?뚮┝ (?ш퀬/?듭젣)
    const safety = (j.events || []).concat(j.alerts || []).concat(j.accidents || []);
    const safetyEl = document.getElementById('safety-banner');
    if (safety.length > 0) {
      const first = safety[0];
      const msg = (first.EVENT_NM || first.MESSAGE || first.ACDNT_TYPE || '?덉쟾 ?뚮┝').toString();
      document.getElementById('safety-banner-text').textContent = msg.substring(0, 80);
      safetyEl.hidden = false;
    } else {
      safetyEl.hidden = true;
    }
  }

  function connect(url) {
    try { if (ws) ws.close(); } catch {}
    setBadge('connecting', '?곌껐 以?);
    ws = new WebSocket(url);
    window.LIVE_WS = ws;   // CTA?먯꽌 impact_log ?≪떊??    ws.onopen = () => {
      setBadge('connected', 'LIVE');
      queryArrival(); queryPpltn(); queryCitydata();
      if (arrivalPoll) clearInterval(arrivalPoll);
      arrivalPoll = setInterval(queryArrival, 20000);
      if (ppltnPoll) clearInterval(ppltnPoll);
      ppltnPoll = setInterval(queryPpltn, 60000);
      if (cdPoll) clearInterval(cdPoll);
      cdPoll = setInterval(queryCitydata, 90000);
    };
    ws.onmessage = (ev) => {
      try {
        const j = JSON.parse(ev.data);
        if (j.type === 'arrival') { liveArrival = j; applyOcc(); }
        else if (j.type === 'population') { livePpltn = j; applyPopulation(j); }
        else if (j.type === 'citydata') { applyCitydata(j); }
        else if (j.type === 'impact_summary') {
          const c = document.getElementById('impact-counter');
          if (c) {
            c.textContent = `?렞 ?ㅻ뒛 ${j.total_count.toLocaleString()}紐?異붿쿇 ?섏슜 쨌 ?됯퇏 -${j.avg_saved_pct.toFixed(0)}% ?쒖궛`;
            c.hidden = false;
          }
        }
        else { liveBev = j;
          if (typeof j.fps === 'number') {
            label.textContent = `LIVE 쨌 ${j.fps.toFixed(1)} fps 쨌 ${(j.tracks || []).length} ?몃옓`;
          }
          applyOcc();
        }
      } catch {}
    };
    ws.onclose = () => { setBadge('', '?ㅽ봽?쇱씤'); clearTimeout(retryT); retryT = setTimeout(() => connect(url), 3000); };
    ws.onerror = () => { setBadge('error', '?곌껐 ?ㅽ뙣'); };
  }

  // GPS 留ㅼ묶 ?쒕룄 (HTTPS context ?먮뒗 localhost?먯꽌留?
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      (pos) => {
        const r = nearest(pos.coords.latitude, pos.coords.longitude);
        curStation = r.station;
        document.getElementById('ctx-name').textContent = `${r.station.name}??;
        document.getElementById('ctx-meta').textContent = `${r.station.line}?몄꽑 쨌 ${r.km.toFixed(1)}km`;
        if (ws && ws.readyState === 1) { queryArrival(); queryPpltn(); queryCitydata(); }
      },
      () => {},
      { enableHighAccuracy: false, timeout: 8000 }
    );
  }

  return { connect, pickWsUrl };
})();

// ?먮룞 ?곌껐
LIVE.connect(LIVE.pickWsUrl());
</script>
