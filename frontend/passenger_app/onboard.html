<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#04060a">
<title>MetroEyes — 탑승 중</title>
<link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon-32.png"><link rel="icon" type="image/png" sizes="192x192" href="/assets/favicon-192.png">
<meta http-equiv="Cache-Control" content="no-cache">

<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="styles.css">
<script>
// 자동 캐시 무효화 — sessionStorage 마커
(function() {
  const CUR = 'v4.1-i18n-onboard';
  if (sessionStorage.getItem('me_ver_onboard') !== CUR) {
    sessionStorage.setItem('me_ver_onboard', CUR);
    const navType = (performance.getEntriesByType('navigation')[0]||{}).type;
    if (navType !== 'reload') location.reload;
  }
});
</script>
<script>
(function() {var h=location.hostname,r=location.protocol==='https:'||h.endsWith('github.io')||h==='app.allthatai.kr';window.METROEYES_BACKEND=r?'https://app.allthatai.kr':'http://localhost:8765';window.METROEYES_WS=r?'wss://app.allthatai.kr':'ws://localhost:8765';})();
</script>
<style>
/* 브랜드 → 허브 링크 (UI polish) */
.brand-link { color: inherit; text-decoration: none; cursor: pointer; transition: opacity .15s ease, transform .15s ease; }
.brand-link:hover { opacity: .82; transform: translateY(-0.5px); }
.brand-link:active { opacity: .65; }
.brand-suffix { color: var(--muted, #8a8a96); font-weight: 600; margin-left: 4px; }
</style>
</head>
<body>
<div class="app">
  <header class="app-header">
    <button class="back-btn" onclick="history.back" data-i18n="back">← 뒤로</button>
    <div class="brand">
      <a href="../index.html" class="brand-link" title="홈으로 (8페이지 진입 허브)"><span class="dot"></span>MetroEyes</a><small>Onboard</small>
      <span class="live-badge" id="live-badge"><span class="led"></span><span id="live-label" data-i18n="live_off">오프라인</span></span>
    </div>
    <button class="back-btn" id="lang-toggle" title="Language toggle" style="cursor: pointer; padding: 4px 8px; border: 1px solid var(--line);">🇰🇷</button>
  </header>

  <div class="topbar">
    <div class="title">
      <span id="t-car">5호차</span>
      <small id="t-line">2호선 잠실행</small>
    </div>
  </div>

  <!-- 편성 strip — 본인 칸 + 추천 칸 비교 -->
  <section class="train-bar" id="train-bar">
    <div class="tb-head">
      <span>편성 점유 비교</span>
      <span class="tb-meta" id="tb-meta">10량 · 평균 — %</span>
    </div>
    <canvas id="trainStrip" class="train-strip-canvas"></canvas>
    <div class="tb-foot">
      <span class="tb-tip" id="tb-tip">— 추천 칸 분석 중</span>
    </div>
  </section>

  <section class="minibev" style="position: relative;">
    <div class="head">
      <span>차내 BEV · 본인 위치 표시</span>
      <span class="live">LIVE</span>
    </div>
    <div class="you-here-tag">YOU</div>
    <canvas id="bev" class="large"></canvas>
  </section>

  <section class="predict">
    <div class="head">다음 정거장 예측</div>
    <div class="flow">
      <span class="now"><span id="now-pct">—</span>%</span>
      <span class="arrow">→</span>
      <span class="next"><span id="next-pct">—</span>%</span>
      <span class="delta" id="delta-meta">—</span>
    </div>
    <div class="station" id="next-station">다음: 잠실나루역 · <span id="next-eta">—</span> 후</div>
  </section>

  <section class="transfer" id="transfer">
    <div class="icon">⇄</div>
    <div class="body">
      <div class="head">환승/하차 안내</div>
      <div class="text" id="transfer-text">— 정거장 정보 로딩 중 —</div>
    </div>
  </section>

  <section id="reward-card" hidden style="margin: 12px 14px; padding: 12px 14px; background: linear-gradient(135deg, rgba(16,185,129,.10), rgba(125,211,211,.06)); border: 1px solid rgba(16,185,129,.40); border-radius: 12px;">
    <div style="font-size: 14px; color: #10b981; font-weight: 700; letter-spacing: 1.2px; text-transform: uppercase; margin-bottom: 8px;">🪙 누적 분산 보상</div>
    <div style="display: flex; gap: 14px; flex-wrap: wrap; align-items: baseline; font-feature-settings: 'tnum';">
      <span style="font-size: 22px; font-weight: 800; color: #fff;"><span id="rw-krw">0</span><span style="font-size: 14px; color: rgba(255,255,255,.6); font-weight: 500; margin-left: 2px;">원</span></span>
      <span style="font-size: 13px; color: rgba(255,255,255,.85);">📍 <span id="rw-n" style="font-weight: 700;">0</span><span style="font-size: 14px; color: rgba(255,255,255,.55);">회 분산 액션</span></span>
      <span style="font-size: 13px; color: rgba(255,255,255,.85);">⏱ <span id="rw-saved" style="font-weight: 700;">0</span><span style="font-size: 14px; color: rgba(255,255,255,.55);">%p 평균 한산</span></span>
    </div>
    <div id="rw-msg" style="font-size: 13px; color: rgba(255,255,255,.65); margin-top: 6px;"></div>
  </section>

  <div class="alert" id="alert">임계 밀집 — 다음 정거장 알라이팅 시 분산 권고</div>

  <div class="demo-time">
    <label>데모 시각</label>
    <input id="hour" type="range" min="5" max="23" value="18" step="1">
    <output id="hourlabel">18시</output>
  </div>
</div>

<script src="../shared/bev_engine.js"></script>
<script>
const params = new URLSearchParams(location.search);
const mode = params.get('mode') || 'subway';
const idx = +params.get('idx') || 0;
const initHour = +params.get('hour') || 18;

const { layouts, decorators, model, occColor, rgba } = BEVEngine;

const VEHICLES = {
  subway: {
    capacity: 160,
    layoutFn: layouts.subway,
    decorate: null,
    cycleDur: { arriving: 1.8, stopped: 5.5, departing: 1.8, running: 4.5 },
    bevCanvasClass: 'large',
    label: (i) => `${i + 1}호차`,
    line: '2호선 잠실행',
    cluster: 'hub',
    nextStop: (h) => ['잠실나루역', '강변역', '구의역'][h % 3] || '잠실나루역',
    transfer:  => ({
      head: '3호선 환승 (잠실나루역 도착 시)',
      text: '<b>좌측 두 번째 문</b>으로 내리면 환승 통로 가까움 · 약 1분 30초',
    }),
  },
  bus: {
    capacity: 50,
    layoutFn: layouts.bus,
    decorate: decorators.bus,
    cycleDur: { arriving: 1.2, stopped: 3.5, departing: 1.2, running: 3.0 },
    bevCanvasClass: 'large',
    label: (i) => `${i + 1}순위 차량`,
    line: '간선 142',
    cluster: 'hub',
    nextStop: (h) => ['올림픽공원역', '몽촌토성역', '잠실나루역'][h % 3] || '올림픽공원역',
    transfer:  => ({
      head: '하차 안내',
      text: '하차 시 <b>뒷문 사용</b>. 다음 정류장에 25명 하차 예정 → 한산해질 예정',
    }),
  },
};

const cfg = VEHICLES[mode];
const canvas = document.getElementById('bev');
canvas.className = cfg.bevCanvasClass;

document.getElementById('t-car').textContent = cfg.label(idx);
document.getElementById('t-line').textContent = cfg.line;

// 누적 분산 보상 카드 렌더 (페이지 진입 시 1회 + window storage 변화 시)
function renderRewardCard {
  let my = {};
  try { my = JSON.parse(localStorage.getItem('metroeyes_my_impact') || '{}'); } catch {}
  const card = document.getElementById('reward-card');
  if (!card) return;
  if (!my.n) { card.hidden = true; return; }
  const krw = my.krw || 0;
  const krwEl = document.getElementById('rw-krw');
  const nEl = document.getElementById('rw-n');
  const savedEl = document.getElementById('rw-saved');
  const msgEl = document.getElementById('rw-msg');
  if (krwEl) krwEl.textContent = krw.toLocaleString;
  if (nEl) nEl.textContent = my.n;
  const avgSaved = my.n > 0 ? Math.round(my.saved / my.n) : 0;
  if (savedEl) savedEl.textContent = avgSaved;
  if (msgEl) {
    const minSaved = Math.round(my.saved * 0.25);  // 25분 통행 가정 × saved%/100 × 100 = saved*0.25분
    const value = minSaved * 167;  // 한국교통연구원 167원/분
    msgEl.textContent = `당신의 분산이 ~${minSaved}분 절감 / 사회적 가치 ₩${value.toLocaleString} 환산 — 정책 ROI 기여`;
  }
  card.hidden = false;
}
renderRewardCard;
window.addEventListener('storage', renderRewardCard);

// ==== 4개 언어 페이지 텍스트 토글 (외국인 시민 포용) ====
const I18N_ONBOARD = {
  ko: { back: '← 뒤로', live_off: '오프라인', flag: '🇰🇷' },
  en: { back: '← Back', live_off: 'Offline', flag: '🇺🇸' },
  zh: { back: '← 返回', live_off: '离线', flag: '🇨🇳' },
  ja: { back: '← 戻る', live_off: 'オフライン', flag: '🇯🇵' },
};
let _curOnLang = (navigator.language || 'ko').slice(0, 2).toLowerCase;
if (!I18N_ONBOARD[_curOnLang]) _curOnLang = 'ko';
function applyOnboardI18n {
  const t = I18N_ONBOARD[_curOnLang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key]) el.textContent = t[key];
  });
  const btn = document.getElementById('lang-toggle');
  if (btn) btn.textContent = t.flag;
  document.documentElement.lang = _curOnLang;
}
document.getElementById('lang-toggle')?.addEventListener('click',  => {
  const order = ['ko', 'en', 'zh', 'ja'];
  _curOnLang = order[(order.indexOf(_curOnLang) + 1) % 4];
  applyOnboardI18n;
});
window.addEventListener('DOMContentLoaded', applyOnboardI18n);

// 도착 ETA 라이브 카운트다운 + 도착 시 보상 합계 메시지
let _etaTimer = null;
function startEtaCountdown(seconds) {
  if (_etaTimer) clearInterval(_etaTimer);
  let remaining = seconds;
  const fmt = (s) => {
    if (s <= 0) return '도착';
    const m = Math.floor(s / 60), sec = s % 60;
    if (m === 0) return `${sec}초`;
    return `${m}분 ${String(sec).padStart(2, '0')}초`;
  };
  function tick {
    const el = document.getElementById('next-eta');
    if (!el) { clearInterval(_etaTimer); return; }
    el.textContent = fmt(remaining);
    if (remaining <= 30 && remaining > 0) {
      el.style.color = '#ef4444';
      el.style.fontWeight = '800';
    }
    if (remaining <= 0) {
      clearInterval(_etaTimer);
      el.innerHTML = '<span style="color: #10b981; font-weight: 800;">✅ 도착</span>';
      // 도착 시 Toss 스타일 파티클 + 누적 보상 안내
      try {
        const my = JSON.parse(localStorage.getItem('metroeyes_my_impact') || '{}');
        const krw = my.krw || 0;
        const lang = (navigator.language || 'ko').slice(0, 2);
        // 파티클 폭발
        if (!document.getElementById('_ob-style')) {
          const s = document.createElement('style');
          s.id = '_ob-style';
          s.textContent = `@keyframes _obCoin{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-100px) scale(.4) rotate(40deg);opacity:0}} ._ob-coin{position:fixed;pointer-events:none;z-index:9999;font-size:24px;animation:_obCoin 1.1s ease-out forwards} @keyframes _obBadge{0%{opacity:0;transform:translateX(-50%) scale(.7)}60%{transform:translateX(-50%) scale(1.06)}100%{opacity:1;transform:translateX(-50%) scale(1)}} #_ob-badge{position:fixed;left:50%;bottom:15vh;transform:translateX(-50%) scale(.7);opacity:0;z-index:9998;animation:_obBadge .5s cubic-bezier(.2,1.4,.4,1) forwards;text-align:center;pointer-events:none}`;
          document.head.appendChild(s);
        }
        const cx = window.innerWidth / 2, cy = window.innerHeight * 0.5;
        for (let i = 0; i < 7; i++) {
          const p = document.createElement('div'); p.className = '_ob-coin'; p.textContent = '🪙';
          p.style.left = (cx + (Math.random - .5) * 160) + 'px';
          p.style.top = cy + 'px';
          p.style.animationDelay = (i * 70) + 'ms';
          document.body.appendChild(p);
          setTimeout( => p.remove, 1400);
        }
        // 배지
        let badge = document.getElementById('_ob-badge');
        if (!badge) { badge = document.createElement('div'); badge.id = '_ob-badge'; document.body.appendChild(badge); }
        const stopName = cfg.nextStop ? cfg.nextStop(hour) : '목적지';
        badge.innerHTML = `<div style="display:inline-block;background:linear-gradient(135deg,#10b981,#059669);border-radius:20px;padding:16px 26px;box-shadow:0 12px 40px rgba(16,185,129,.5);color:#fff;"><div style="font-size:28px;margin-bottom:4px;">✅</div><div style="font-size:16px;font-weight:800;">${stopName} 도착</div>${krw > 0 ? `<div style="font-size:13px;opacity:.85;margin-top:4px;">누적 적립 ₩${krw.toLocaleString}</div>` : ''}</div>`;
        setTimeout( => { badge.style.opacity = '0'; badge.style.transition = 'opacity .4s'; setTimeout( => badge.remove, 500); }, 2500);
        if (my.n) {
          const msg = { ko: `${stopName} 도착. 누적 ${krw.toLocaleString}원 적립`, en: `Arrived at ${stopName}. Total ${krw.toLocaleString} won`, zh: `到达 ${stopName}。累计 ${krw} 韩元`, ja: `${stopName} 到着。累計 ${krw} ウォン` }[lang] || `${stopName} 도착`;
          if ('speechSynthesis' in window) { const u = new SpeechSynthesisUtterance(msg); u.lang = { ko: 'ko-KR', en: 'en-US', zh: 'zh-CN', ja: 'ja-JP' }[lang] || 'ko-KR'; u.volume = 0.6; u.rate = 1.0; window.speechSynthesis.speak(u); }
        }
      } catch {}
      return;
    }
    remaining--;
  }
  tick;
  _etaTimer = setInterval(tick, 1000);
}

// 사용자 위치 — 차량 안 어딘가 (랜덤하지만 일관되게)
const userPos = { x: 0.4, y: 0.5 };  // 0~1 of car interior

function drawUserOverlay(ctx, L, sim) {
  // 사용자 위치 표시 (차량 좌표계로 변환)
  const ux = L.pad + userPos.x * L.cw;
  const uy = L.pad + userPos.y * L.ch;
  // 외곽 펄스 링
  const t = (performance.now / 1000) % 1;
  ctx.save;
  for (let i = 0; i < 2; i++) {
    const phase = (t + i * 0.5) % 1;
    const radius = 8 + phase * 22;
    const alpha = 0.6 * (1 - phase);
    ctx.strokeStyle = `rgba(125, 211, 211, ${alpha})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath;
    ctx.arc(ux, uy, radius, 0, Math.PI * 2);
    ctx.stroke;
  }
  // 코어 점
  ctx.fillStyle = '#7dd3d3';
  ctx.shadowColor = '#7dd3d3';
  ctx.shadowBlur = 12;
  ctx.beginPath;
  ctx.arc(ux, uy, 5.5, 0, Math.PI * 2);
  ctx.fill;
  ctx.restore;
}

const sim = BEVEngine.createSim({
  canvas,
  capacity: cfg.capacity,
  cycleDur: cfg.cycleDur,
  layoutFn: cfg.layoutFn,
  decorate: cfg.decorate,
  overlay: drawUserOverlay,
  bgColor: mode === 'bus' ? '#101828' : '#0c1018',
  compact: true,
});

let currentOcc = 0.5;
function applyHour {
  const hour = +document.getElementById('hour').value;
  document.getElementById('hourlabel').textContent = hour + '시';

  let occ;
  if (mode === 'subway') {
    const avg = model.trainOccupancyAt(hour, cfg.cluster);
    const occs = model.carOccupancies(avg, 10, hour * 13 + 7);
    occ = occs[idx];
  } else {
    const avg = model.trainOccupancyAt(hour, cfg.cluster);
    const r = ((seed) => { let s = seed; return  => { s = (s * 9301 + 49297) % 233280; return s / 233280; }; })(hour * 17 + 3 + idx);
    const noise = (r - 0.5) * 0.20;
    occ = Math.max(0.05, Math.min(1.05, avg * 0.92 + noise));
  }
  currentOcc = occ;
  sim.setTargetOccupancy(occ);
  // 다음 정거장 예측: 25% 알라이팅 가정 → 약 -15~25%
  const nextOcc = Math.max(0.1, occ - 0.18 + (Math.random - 0.5) * 0.06);

  document.getElementById('now-pct').textContent = Math.round(occ * 100);
  document.getElementById('next-pct').textContent = Math.round(nextOcc * 100);
  const delta = Math.round((nextOcc - occ) * 100);
  document.getElementById('delta-meta').textContent =
    delta < 0 ? `${delta}%p · 약 ${Math.round(Math.abs(delta) * 0.4)}명 하차` : `+${delta}%p`;
  document.getElementById('next-station').innerHTML =
    `다음: <b style="color: var(--fg)">${cfg.nextStop(hour)}</b> · <span id="next-eta">2분 30초</span> 후`;
  // 도착 ETA 라이브 카운트다운 시작 (4분 전 → 0)
  startEtaCountdown(240);

  const tr = cfg.transfer;
  document.getElementById('transfer').querySelector('.head').textContent = tr.head;
  document.getElementById('transfer-text').innerHTML = tr.text;

  document.getElementById('alert').classList.toggle('show', occ >= 0.92);
}

// === 편성 strip — 다른 칸 점유 비교 + 추천 칸 ===
const stripCv = document.getElementById('trainStrip');
let _liveOccs = null;   // 백엔드 라이브 — null 이면 시뮬

function drawTrainStrip {
  const r = stripCv.getBoundingClientRect;
  const dpr = devicePixelRatio || 1;
  stripCv.width = r.width * dpr; stripCv.height = r.height * dpr;
  const ctx = stripCv.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const W = r.width, H = r.height;
  ctx.clearRect(0, 0, W, H);
  const N = mode === 'subway' ? 10 : 3;
  const pad = 8, gap = 4;
  const cw = (W - pad * 2 - gap * (N - 1)) / N;
  const ch = H - pad - 18;

  // 점유 데이터 (라이브 우선, 없으면 모델 시뮬)
  let occs;
  if (_liveOccs && _liveOccs.length === N) {
    occs = _liveOccs;
  } else {
    const hour = +document.getElementById('hour').value;
    if (mode === 'subway') {
      const avg = model.trainOccupancyAt(hour, cfg.cluster);
      occs = model.carOccupancies(avg, N, hour * 13 + 7);
    } else {
      const avg = model.trainOccupancyAt(hour, cfg.cluster);
      const r2 = (s =>  => { s = (s * 9301 + 49297) % 233280; return s / 233280; })(hour * 17 + 3);
      occs = Array.from({ length: N },  => Math.max(0.05, Math.min(1.05, avg * 0.92 + (r2 - 0.5) * 0.20)));
    }
  }
  const meanOcc = occs.reduce((a, b) => a + b, 0) / occs.length;
  // 추천 칸: 가장 한산
  let bestI = 0;
  for (let i = 1; i < N; i++) if (occs[i] < occs[bestI]) bestI = i;

  // 막대 그리기
  for (let i = 0; i < N; i++) {
    const x = pad + i * (cw + gap);
    const o = occs[i];
    const isMe = i === idx;
    const isBest = i === bestI;
    // 배경 박스
    ctx.fillStyle = 'rgba(255,255,255,0.025)';
    roundRect(ctx, x, pad, cw, ch, 4); ctx.fill;
    // 점유 막대
    const fillH = ch * Math.min(1, o);
    const c = occColor(o);
    ctx.fillStyle = `rgba(${c[0]|0},${c[1]|0},${c[2]|0},0.78)`;
    roundRect(ctx, x, pad + (ch - fillH), cw, fillH, 4); ctx.fill;
    // 테두리 (본인 / 추천)
    ctx.lineWidth = isMe || isBest ? 2 : 1;
    ctx.strokeStyle = isMe ? '#7dd3d3' : isBest ? '#7dd3d3' : 'rgba(255,255,255,0.08)';
    if (isMe || isBest) {
      ctx.shadowColor = '#7dd3d3'; ctx.shadowBlur = isMe ? 14 : 8;
    }
    roundRect(ctx, x + 0.5, pad + 0.5, cw - 1, ch - 1, 4); ctx.stroke;
    ctx.shadowBlur = 0;
    // 호차 번호 + %
    ctx.font = '600 11px Inter, "Malgun Gothic"';
    ctx.fillStyle = isMe ? '#7dd3d3' : '#8e98ac';
    ctx.textAlign = 'center';
    const label = mode === 'subway' ? `${i + 1}` : ['1순', '2순', '3순'][i];
    ctx.fillText(label, x + cw / 2, pad + ch + 12);
    // 본인 표시 마커 (위)
    if (isMe) {
      ctx.fillStyle = '#7dd3d3';
      ctx.beginPath; ctx.moveTo(x + cw/2 - 5, pad - 3); ctx.lineTo(x + cw/2 + 5, pad - 3); ctx.lineTo(x + cw/2, pad + 3); ctx.fill;
    }
  }

  // 메타 + 추천 메시지
  document.getElementById('tb-meta').textContent =
    `${N}량 · 평균 ${Math.round(meanOcc * 100)}% · ${_liveOccs ? 'LIVE' : 'SIM'}`;
  const tip = document.getElementById('tb-tip');
  if (bestI === idx) {
    tip.innerHTML = `✓ 현재 ${cfg.label(idx)}가 가장 한산. 그대로 탑승.`;
  } else {
    const diff = Math.round((occs[idx] - occs[bestI]) * 100);
    const dist = Math.abs(idx - bestI);
    tip.innerHTML = `▶ <b>${cfg.label(bestI)}</b>이 가장 한산 (${diff}%p 더 한산, ${dist}칸 이동 = 약 ${dist * 20}m · ${dist * 6}초)`;
  }
}
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath;
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath;
}

window.addEventListener('resize',  => { sim.invalidateLayout; drawTrainStrip; });
document.getElementById('hour').value = initHour;
document.getElementById('hour').addEventListener('input',  => { applyHour; drawTrainStrip; });
applyHour;
drawTrainStrip;
setInterval(drawTrainStrip, 1500);

let lastT = performance.now;
function tick(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  sim.tick(dt);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch( => {});
}

// ============== 라이브 백엔드 (탑승 후 — 차내 점유율 갱신) ==============
( => {
  const wsUrl = ( => {
    const p = new URLSearchParams(location.search).get('ws');
    if (p) return p;
    const saved = localStorage.getItem('subwaybev_ws');
    if (saved) return saved;
    if (location.hostname.endsWith('ngrok-free.dev')) return `wss://${location.host}`;
    if (location.hostname.endsWith('github.io') || location.protocol === 'https:') return 'wss://app.allthatai.kr';
    return window.METROEYES_WS;
  });
  const badge = document.getElementById('live-badge');
  const label = document.getElementById('live-label');
  function setBadge(state, text) { badge.classList.remove('connected','connecting','error'); if (state) badge.classList.add(state); label.textContent = text; }
  let ws = null, retryT = null;
  function connect {
    setBadge('connecting', '연결 중');
    try { if (ws) ws.close; } catch {}
    ws = new WebSocket(wsUrl);
    ws.onopen =  => setBadge('connected', 'LIVE');
    ws.onmessage = (ev) => {
      try {
        const j = JSON.parse(ev.data);
        if (j.type === 'arrival' || j.type === 'population' || j.type === 'occupancy_predict' || j.type === 'context') return;
        // BEV 페이로드 — 라이브 점유율 갱신 + 칸별 분포 추정
        const persons = (j.tracks || []).filter(t => t.class === 'person');
        const personN = persons.length;
        const live = Math.min(1.05, personN / 20);
        if (typeof sim !== 'undefined' && sim) { sim.setTargetOccupancy(live); }
        // bev_x 분포 → N 칸 빈도. 한 카메라 = 한 칸 가정이면 모든 칸 동일.
        // 데모: 한 칸의 분포를 N 칸의 가짜 분산으로 매핑 (bev_x quantile bins)
        const N = mode === 'subway' ? 10 : 3;
        const bins = new Array(N).fill(0);
        for (const p of persons) {
          if (!Number.isFinite(p.bev_x)) continue;
          let i = Math.floor(p.bev_x * N);
          if (i < 0) i = 0; if (i >= N) i = N - 1;
          bins[i]++;
        }
        // 정원 N명/칸 = 빈도 정규화
        if (personN >= 2) {
          _liveOccs = bins.map(b => Math.min(1.05, b / Math.max(2, personN/N * 1.5)));
          drawTrainStrip;
        }
        // 다음 정거장 예측 (휴리스틱)
        const nowPctEl = document.getElementById('now-pct');
        const nextPctEl = document.getElementById('next-pct');
        if (nowPctEl) nowPctEl.textContent = Math.round(live * 100);
        if (nextPctEl) nextPctEl.textContent = Math.round(Math.min(1, live + 0.05) * 100);
        if (typeof j.fps === 'number') label.textContent = `LIVE · ${j.fps.toFixed(1)} fps · ${personN}명`;
      } catch {}
    };
    ws.onclose =  => { setBadge('', '오프라인'); clearTimeout(retryT); retryT = setTimeout(connect, 3000); };
    ws.onerror =  => setBadge('error', '연결 실패');
  }
  connect;
});
</script>

<!-- 외국인 탑승자 첫 방문 환영 toast (4언어 자동) -->
<div id="ob-toast-onboard" hidden style="position:fixed;bottom:80px;left:50%;transform:translateX(-50%);z-index:9999;background:linear-gradient(135deg,rgba(125,211,211,.20),rgba(16,185,129,.10));border:1px solid rgba(125,211,211,.55);border-radius:14px;padding:14px 18px;max-width:340px;box-shadow:0 8px 24px rgba(0,0,0,0.5);font-family:ui-sans-serif,system-ui;color:#fff;line-height:1.5;font-size:13px;backdrop-filter:blur(10px)">
  <div id="ob-text-onboard" style="margin-bottom:10px"></div>
  <div style="display:flex;gap:8px;justify-content:flex-end">
    <button id="ob-dismiss-onboard" style="background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);color:#fff;padding:5px 12px;border-radius:8px;font-size: 14px;cursor:pointer">OK</button>
  </div>
</div>
<script>
(function() {
  if (localStorage.getItem('me_onboard_seen')) return;
  const OB = {
    ko: '🚆 라이브 칸별 점유율 모니터. 한산한 칸으로 이동 시 +₩200 자동 적립.',
    en: '🚆 Live per-car occupancy monitor. Move to a less crowded car to auto-earn ₩200.',
    zh: '🚆 实时车厢占用率监视器。移至人少的车厢自动获得 ₩200。',
    ja: '🚆 ライブ車両占有率モニター。空いている車両に移動すると自動で ₩200 獲得。',
  };
  const lang = (navigator.language || 'ko').slice(0, 2).toLowerCase;
  const txt = OB[lang] || OB.ko;
  const t = document.getElementById('ob-toast-onboard');
  const x = document.getElementById('ob-text-onboard');
  if (!t || !x) return;
  x.textContent = txt;
  t.hidden = false;
  document.getElementById('ob-dismiss-onboard')?.addEventListener('click',  => {
    t.hidden = true;
    localStorage.setItem('me_onboard_seen', '1');
  });
  setTimeout( => {
    if (!t.hidden) { t.hidden = true; localStorage.setItem('me_onboard_seen', '1'); }
  }, 12000);
});
</script>
