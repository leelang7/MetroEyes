<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#04060a">
<title>MetroEyes — 탑승 중</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="app">
  <header class="app-header">
    <button class="back-btn" onclick="history.back()">← 뒤로</button>
    <div class="brand">
      <span class="dot"></span>MetroEyes<small>Onboard</small>
      <span class="live-badge" id="live-badge"><span class="led"></span><span id="live-label">오프라인</span></span>
    </div>
    <span style="width: 50px"></span>
  </header>

  <div class="topbar">
    <div class="title">
      <span id="t-car">5호차</span>
      <small id="t-line">2호선 잠실행</small>
    </div>
  </div>

  <!-- 편성 strip — 본인 칸 + 추천 칸 비교 -->
  <section class="train-bar" id="train-bar">
    <div class="tb-head">
      <span>편성 점유 비교</span>
      <span class="tb-meta" id="tb-meta">10량 · 평균 — %</span>
    </div>
    <canvas id="trainStrip" class="train-strip-canvas"></canvas>
    <div class="tb-foot">
      <span class="tb-tip" id="tb-tip">— 추천 칸 분석 중</span>
    </div>
  </section>

  <section class="minibev" style="position: relative;">
    <div class="head">
      <span>차내 BEV · 본인 위치 표시</span>
      <span class="live">LIVE</span>
    </div>
    <div class="you-here-tag">YOU</div>
    <canvas id="bev" class="large"></canvas>
  </section>

  <section class="predict">
    <div class="head">다음 정거장 예측</div>
    <div class="flow">
      <span class="now"><span id="now-pct">—</span>%</span>
      <span class="arrow">→</span>
      <span class="next"><span id="next-pct">—</span>%</span>
      <span class="delta" id="delta-meta">—</span>
    </div>
    <div class="station" id="next-station">다음: 잠실나루역 · <span id="next-eta">—</span> 후</div>
  </section>

  <section class="transfer" id="transfer">
    <div class="icon">⇄</div>
    <div class="body">
      <div class="head">환승/하차 안내</div>
      <div class="text" id="transfer-text">— 정거장 정보 로딩 중 —</div>
    </div>
  </section>

  <div class="alert" id="alert">임계 밀집 — 다음 정거장 알라이팅 시 분산 권고</div>

  <div class="demo-time">
    <label>데모 시각</label>
    <input id="hour" type="range" min="5" max="23" value="18" step="1">
    <output id="hourlabel">18시</output>
  </div>
</div>

<script src="../shared/bev_engine.js"></script>
<script>
const params = new URLSearchParams(location.search);
const mode = params.get('mode') || 'subway';
const idx = +params.get('idx') || 0;
const initHour = +params.get('hour') || 18;

const { layouts, decorators, model, occColor, rgba } = BEVEngine;

const VEHICLES = {
  subway: {
    capacity: 160,
    layoutFn: layouts.subway,
    decorate: null,
    cycleDur: { arriving: 1.8, stopped: 5.5, departing: 1.8, running: 4.5 },
    bevCanvasClass: 'large',
    label: (i) => `${i + 1}호차`,
    line: '2호선 잠실행',
    cluster: 'hub',
    nextStop: (h) => ['잠실나루역', '강변역', '구의역'][h % 3] || '잠실나루역',
    transfer: () => ({
      head: '3호선 환승 (잠실나루역 도착 시)',
      text: '<b>좌측 두 번째 문</b>으로 내리면 환승 통로 가까움 · 약 1분 30초',
    }),
  },
  bus: {
    capacity: 50,
    layoutFn: layouts.bus,
    decorate: decorators.bus,
    cycleDur: { arriving: 1.2, stopped: 3.5, departing: 1.2, running: 3.0 },
    bevCanvasClass: 'large',
    label: (i) => `${i + 1}순위 차량`,
    line: '간선 142',
    cluster: 'hub',
    nextStop: (h) => ['올림픽공원역', '몽촌토성역', '잠실나루역'][h % 3] || '올림픽공원역',
    transfer: () => ({
      head: '하차 안내',
      text: '하차 시 <b>뒷문 사용</b>. 다음 정류장에 25명 하차 예정 → 한산해질 예정',
    }),
  },
};

const cfg = VEHICLES[mode];
const canvas = document.getElementById('bev');
canvas.className = cfg.bevCanvasClass;

document.getElementById('t-car').textContent = cfg.label(idx);
document.getElementById('t-line').textContent = cfg.line;

// 사용자 위치 — 차량 안 어딘가 (랜덤하지만 일관되게)
const userPos = { x: 0.4, y: 0.5 };  // 0~1 of car interior

function drawUserOverlay(ctx, L, sim) {
  // 사용자 위치 표시 (차량 좌표계로 변환)
  const ux = L.pad + userPos.x * L.cw;
  const uy = L.pad + userPos.y * L.ch;
  // 외곽 펄스 링
  const t = (performance.now() / 1000) % 1;
  ctx.save();
  for (let i = 0; i < 2; i++) {
    const phase = (t + i * 0.5) % 1;
    const radius = 8 + phase * 22;
    const alpha = 0.6 * (1 - phase);
    ctx.strokeStyle = `rgba(125, 211, 211, ${alpha})`;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(ux, uy, radius, 0, Math.PI * 2);
    ctx.stroke();
  }
  // 코어 점
  ctx.fillStyle = '#7dd3d3';
  ctx.shadowColor = '#7dd3d3';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(ux, uy, 5.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

const sim = BEVEngine.createSim({
  canvas,
  capacity: cfg.capacity,
  cycleDur: cfg.cycleDur,
  layoutFn: cfg.layoutFn,
  decorate: cfg.decorate,
  overlay: drawUserOverlay,
  compact: true,
});

let currentOcc = 0.5;
function applyHour() {
  const hour = +document.getElementById('hour').value;
  document.getElementById('hourlabel').textContent = hour + '시';

  let occ;
  if (mode === 'subway') {
    const avg = model.trainOccupancyAt(hour, cfg.cluster);
    const occs = model.carOccupancies(avg, 10, hour * 13 + 7);
    occ = occs[idx];
  } else {
    const avg = model.trainOccupancyAt(hour, cfg.cluster);
    const r = ((seed) => { let s = seed; return () => { s = (s * 9301 + 49297) % 233280; return s / 233280; }; })(hour * 17 + 3 + idx);
    const noise = (r() - 0.5) * 0.20;
    occ = Math.max(0.05, Math.min(1.05, avg * 0.92 + noise));
  }
  currentOcc = occ;
  sim.setTargetOccupancy(occ);
  // 다음 정거장 예측: 25% 알라이팅 가정 → 약 -15~25%
  const nextOcc = Math.max(0.1, occ - 0.18 + (Math.random() - 0.5) * 0.06);

  document.getElementById('now-pct').textContent = Math.round(occ * 100);
  document.getElementById('next-pct').textContent = Math.round(nextOcc * 100);
  const delta = Math.round((nextOcc - occ) * 100);
  document.getElementById('delta-meta').textContent =
    delta < 0 ? `${delta}%p · 약 ${Math.round(Math.abs(delta) * 0.4)}명 하차` : `+${delta}%p`;
  document.getElementById('next-station').innerHTML =
    `다음: <b style="color: var(--fg)">${cfg.nextStop(hour)}</b> · <span id="next-eta">2분 30초</span> 후`;

  const tr = cfg.transfer();
  document.getElementById('transfer').querySelector('.head').textContent = tr.head;
  document.getElementById('transfer-text').innerHTML = tr.text;

  document.getElementById('alert').classList.toggle('show', occ >= 0.92);
}

// === 편성 strip — 다른 칸 점유 비교 + 추천 칸 ===
const stripCv = document.getElementById('trainStrip');
let _liveOccs = null;   // 백엔드 라이브 — null 이면 시뮬

function drawTrainStrip() {
  const r = stripCv.getBoundingClientRect();
  const dpr = devicePixelRatio || 1;
  stripCv.width = r.width * dpr; stripCv.height = r.height * dpr;
  const ctx = stripCv.getContext('2d');
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const W = r.width, H = r.height;
  ctx.clearRect(0, 0, W, H);
  const N = mode === 'subway' ? 10 : 3;
  const pad = 8, gap = 4;
  const cw = (W - pad * 2 - gap * (N - 1)) / N;
  const ch = H - pad - 18;

  // 점유 데이터 (라이브 우선, 없으면 모델 시뮬)
  let occs;
  if (_liveOccs && _liveOccs.length === N) {
    occs = _liveOccs;
  } else {
    const hour = +document.getElementById('hour').value;
    if (mode === 'subway') {
      const avg = model.trainOccupancyAt(hour, cfg.cluster);
      occs = model.carOccupancies(avg, N, hour * 13 + 7);
    } else {
      const avg = model.trainOccupancyAt(hour, cfg.cluster);
      const r2 = (s => () => { s = (s * 9301 + 49297) % 233280; return s / 233280; })(hour * 17 + 3);
      occs = Array.from({ length: N }, () => Math.max(0.05, Math.min(1.05, avg * 0.92 + (r2() - 0.5) * 0.20)));
    }
  }
  const meanOcc = occs.reduce((a, b) => a + b, 0) / occs.length;
  // 추천 칸: 가장 한산
  let bestI = 0;
  for (let i = 1; i < N; i++) if (occs[i] < occs[bestI]) bestI = i;

  // 막대 그리기
  for (let i = 0; i < N; i++) {
    const x = pad + i * (cw + gap);
    const o = occs[i];
    const isMe = i === idx;
    const isBest = i === bestI;
    // 배경 박스
    ctx.fillStyle = 'rgba(255,255,255,0.025)';
    roundRect(ctx, x, pad, cw, ch, 4); ctx.fill();
    // 점유 막대
    const fillH = ch * Math.min(1, o);
    const c = occColor(o);
    ctx.fillStyle = `rgba(${c[0]|0},${c[1]|0},${c[2]|0},0.78)`;
    roundRect(ctx, x, pad + (ch - fillH), cw, fillH, 4); ctx.fill();
    // 테두리 (본인 / 추천)
    ctx.lineWidth = isMe || isBest ? 2 : 1;
    ctx.strokeStyle = isMe ? '#7dd3d3' : isBest ? '#7dd3d3' : 'rgba(255,255,255,0.08)';
    if (isMe || isBest) {
      ctx.shadowColor = '#7dd3d3'; ctx.shadowBlur = isMe ? 14 : 8;
    }
    roundRect(ctx, x + 0.5, pad + 0.5, cw - 1, ch - 1, 4); ctx.stroke();
    ctx.shadowBlur = 0;
    // 호차 번호 + %
    ctx.font = '600 11px Inter, "Malgun Gothic"';
    ctx.fillStyle = isMe ? '#7dd3d3' : '#8e98ac';
    ctx.textAlign = 'center';
    const label = mode === 'subway' ? `${i + 1}` : ['1순', '2순', '3순'][i];
    ctx.fillText(label, x + cw / 2, pad + ch + 12);
    // 본인 표시 마커 (위)
    if (isMe) {
      ctx.fillStyle = '#7dd3d3';
      ctx.beginPath(); ctx.moveTo(x + cw/2 - 5, pad - 3); ctx.lineTo(x + cw/2 + 5, pad - 3); ctx.lineTo(x + cw/2, pad + 3); ctx.fill();
    }
  }

  // 메타 + 추천 메시지
  document.getElementById('tb-meta').textContent =
    `${N}량 · 평균 ${Math.round(meanOcc * 100)}% · ${_liveOccs ? 'LIVE' : 'SIM'}`;
  const tip = document.getElementById('tb-tip');
  if (bestI === idx) {
    tip.innerHTML = `✓ 현재 ${cfg.label(idx)}가 가장 한산. 그대로 탑승.`;
  } else {
    const diff = Math.round((occs[idx] - occs[bestI]) * 100);
    const dist = Math.abs(idx - bestI);
    tip.innerHTML = `▶ <b>${cfg.label(bestI)}</b>이 가장 한산 (${diff}%p 더 한산, ${dist}칸 이동 = 약 ${dist * 20}m · ${dist * 6}초)`;
  }
}
function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

window.addEventListener('resize', () => { sim.invalidateLayout(); drawTrainStrip(); });
document.getElementById('hour').value = initHour;
document.getElementById('hour').addEventListener('input', () => { applyHour(); drawTrainStrip(); });
applyHour();
drawTrainStrip();
setInterval(drawTrainStrip, 1500);

let lastT = performance.now();
function tick(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  sim.tick(dt);
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ============== 라이브 백엔드 (탑승 후 — 차내 점유율 갱신) ==============
(() => {
  const wsUrl = (() => {
    const p = new URLSearchParams(location.search).get('ws');
    if (p) return p;
    const saved = localStorage.getItem('subwaybev_ws');
    if (saved) return saved;
    if (location.hostname.endsWith('ngrok-free.dev')) return `wss://${location.host}`;
    if (location.hostname.endsWith('github.io') || location.protocol === 'https:') return 'wss://app.allthatai.kr';
    return 'ws://localhost:8765';
  })();
  const badge = document.getElementById('live-badge');
  const label = document.getElementById('live-label');
  function setBadge(state, text) { badge.classList.remove('connected','connecting','error'); if (state) badge.classList.add(state); label.textContent = text; }
  let ws = null, retryT = null;
  function connect() {
    setBadge('connecting', '연결 중');
    try { if (ws) ws.close(); } catch {}
    ws = new WebSocket(wsUrl);
    ws.onopen = () => setBadge('connected', 'LIVE');
    ws.onmessage = (ev) => {
      try {
        const j = JSON.parse(ev.data);
        if (j.type === 'arrival' || j.type === 'population' || j.type === 'occupancy_predict' || j.type === 'context') return;
        // BEV 페이로드 — 라이브 점유율 갱신 + 칸별 분포 추정
        const persons = (j.tracks || []).filter(t => t.class === 'person');
        const personN = persons.length;
        const live = Math.min(1.05, personN / 20);
        if (typeof sim !== 'undefined' && sim) { sim.setTargetOccupancy(live); }
        // bev_x 분포 → N 칸 빈도. 한 카메라 = 한 칸 가정이면 모든 칸 동일.
        // 데모: 한 칸의 분포를 N 칸의 가짜 분산으로 매핑 (bev_x quantile bins)
        const N = mode === 'subway' ? 10 : 3;
        const bins = new Array(N).fill(0);
        for (const p of persons) {
          if (!Number.isFinite(p.bev_x)) continue;
          let i = Math.floor(p.bev_x * N);
          if (i < 0) i = 0; if (i >= N) i = N - 1;
          bins[i]++;
        }
        // 정원 N명/칸 = 빈도 정규화
        if (personN >= 2) {
          _liveOccs = bins.map(b => Math.min(1.05, b / Math.max(2, personN/N * 1.5)));
          drawTrainStrip();
        }
        // 다음 정거장 예측 (휴리스틱)
        const nowPctEl = document.getElementById('now-pct');
        const nextPctEl = document.getElementById('next-pct');
        if (nowPctEl) nowPctEl.textContent = Math.round(live * 100);
        if (nextPctEl) nextPctEl.textContent = Math.round(Math.min(1, live + 0.05) * 100);
        if (typeof j.fps === 'number') label.textContent = `LIVE · ${j.fps.toFixed(1)} fps · ${personN}명`;
      } catch {}
    };
    ws.onclose = () => { setBadge('', '오프라인'); clearTimeout(retryT); retryT = setTimeout(connect, 3000); };
    ws.onerror = () => setBadge('error', '연결 실패');
  }
  connect();
})();
</script>
</body>
</html>
