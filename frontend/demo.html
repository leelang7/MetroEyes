<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=1600, initial-scale=0.6">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>MetroEyes — 통합 시연 (마스터)</title>
<meta property="og:title" content="MetroEyes — 4-패널 통합 시연 (5분 자동)">
<meta property="og:description" content="운영자 + 시민 + 광고 + 실카메라 동시 재생">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='20' fill='%237dd3d3'/%3E%3Ctext x='50' y='62' text-anchor='middle' font-size='60' font-family='sans-serif' font-weight='800' fill='%230a0a0e'%3EM%3C/text%3E%3C/svg%3E">
<link rel="stylesheet" href="shared/tokens.css">
<style>
  :root {
    --bg: #0a0a0e;
    --panel: #14141a;
    --line: rgba(125,211,211,0.16);
    --text: #e8e8ee;
    --muted: #8a8a96;
    --accent: #7dd3d3;
    --bus: #f97316;
    --realcam: #ef4444;
    --ads: #10b981;
  }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; overflow: hidden; }
  header {
    display: flex; align-items: center; gap: 16px; padding: 8px 16px; height: 44px;
    background: linear-gradient(135deg, rgba(125,211,211,0.10), rgba(20,20,26,0.85));
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  #demo-bar {
    position: absolute; left: 0; bottom: 0; height: 2px; width: 0;
    background: linear-gradient(90deg, var(--accent), #38bdf8);
    transition: width .25s linear; box-shadow: 0 0 8px var(--accent);
  }
  header .brand { font-size: 14px; font-weight: 800; letter-spacing: .8px; color: var(--accent); }
  header .brand small { display: block; font-size: 9px; letter-spacing: 1.2px; color: var(--muted); font-weight: 500; }
  header .scenario { flex: 1; font-size: 11px; color: var(--muted); }
  header .scenario b { color: var(--text); font-weight: 700; }
  header .timer { font-family: 'Roboto Mono', monospace; font-size: 12px; color: var(--accent); padding: 4px 10px; background: rgba(125,211,211,.10); border: 1px solid var(--line); border-radius: 6px; min-width: 64px; text-align: center; }
  header button {
    padding: 6px 14px; background: linear-gradient(135deg, #f59e0b, #ef4444);
    color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: 800;
    cursor: pointer; letter-spacing: .4px;
  }
  header button:disabled { opacity: .55; cursor: not-allowed; }
  main {
    display: grid; grid-template-columns: 1.6fr 1fr 1.2fr; gap: 8px;
    padding: 8px; height: calc(100vh - 60px);
  }
  .panel {
    position: relative; background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; overflow: hidden;
  }
  .panel-head {
    position: absolute; top: 0; left: 0; right: 0; height: 28px;
    display: flex; align-items: center; gap: 8px; padding: 0 12px;
    background: rgba(0,0,0,.4); backdrop-filter: blur(6px);
    font-size: 11px; letter-spacing: .8px; text-transform: uppercase; z-index: 5;
    border-bottom: 1px solid var(--line);
  }
  .panel-head .led {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 8px var(--accent);
    animation: pulse 1.6s ease-in-out infinite;
  }
  .panel-head.bus .led { background: var(--bus); box-shadow: 0 0 8px var(--bus); }
  .panel-head.cam .led { background: var(--realcam); box-shadow: 0 0 8px var(--realcam); }
  .panel-head.ads .led { background: var(--ads); box-shadow: 0 0 8px var(--ads); }
  .panel-head.app .led { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: .55; transform: scale(.85); }
  }
  iframe {
    width: 100%; height: 100%; border: 0; display: block;
    transform-origin: top left;
  }
  .col-stack {
    display: grid; grid-template-rows: 1fr 1fr; gap: 8px;
    height: 100%;
  }
  .stage-banner {
    position: absolute; left: 50%; top: 38px; transform: translateX(-50%);
    background: linear-gradient(135deg, var(--accent), #38bdf8); color: #0a0a0e;
    padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 800;
    letter-spacing: .4px; box-shadow: 0 8px 24px rgba(125,211,211,.4);
    opacity: 0; transition: opacity .35s, transform .35s; pointer-events: none; z-index: 100;
  }
  .stage-banner.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<header>
  <div class="brand" id="brand-text">MetroEyes 통합 시연<small id="brand-sub">SubwayBEV — 운영자 + 시민 + 디스플레이 양면 가치 사슬</small></div>
  <a href="pitch.html" style="padding: 4px 10px; background: linear-gradient(135deg, rgba(125,211,211,.18), rgba(16,185,129,.10)); border: 1px solid var(--accent); color: var(--accent); border-radius: 6px; font-size: 11px; font-weight: 700; text-decoration: none;">📊 정책 보고</a>
  <button id="lang-toggle" style="padding: 4px 8px; background: var(--panel); border: 1px solid var(--line); color: var(--muted); border-radius: 6px; font-size: 14px; cursor: pointer;" title="Language toggle">🇰🇷</button>
  <div class="scenario" id="scenario">▶︎ <b>시연 시작</b> 버튼을 눌러 5분 전체 흐름을 자동 재생하세요. <span style="opacity:.65;">(잠실 18시 → 폭증 → 분산 → 보상 → 광고 라이브)</span></div>
  <div class="timer" id="timer">00:00</div>
  <button id="start">▶︎ 시연 시작</button>
  <div id="demo-bar"></div>
</header>
<main>
  <div class="panel">
    <div class="panel-head"><span class="led"></span>운영자 콘솔 — 지하철</div>
    <iframe id="if-op" src="operator_web/index.html"></iframe>
  </div>
  <div class="col-stack">
    <div class="panel">
      <div class="panel-head app"><span class="led"></span>시민 PWA</div>
      <iframe id="if-pwa" src="passenger_app/index.html"></iframe>
    </div>
    <div class="panel">
      <div class="panel-head ads"><span class="led"></span>광고 단가 라이브</div>
      <iframe id="if-ad" src="operator_web/ad_pricing.html"></iframe>
    </div>
  </div>
  <div class="panel">
    <div class="panel-head cam"><span class="led"></span>실 카메라 BEV (3D)</div>
    <iframe id="if-cam" src="operator_web/realbev.html"></iframe>
  </div>
</main>
<div class="stage-banner" id="stage"></div>

<!-- 첫 방문 환영 toast (4언어) — 외국인 평가위원 친화 -->
<div id="demo-welcome" hidden style="position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9999;background:linear-gradient(135deg,rgba(125,211,211,.20),rgba(16,185,129,.10));border:1px solid rgba(125,211,211,.55);border-radius:14px;padding:14px 22px;max-width:520px;box-shadow:0 8px 24px rgba(0,0,0,0.5);font-family:ui-sans-serif,system-ui;color:#fff;line-height:1.5;font-size:13px;backdrop-filter:blur(10px)">
  <div id="dw-text" style="margin-bottom:10px"></div>
  <div style="display:flex;gap:8px;justify-content:flex-end">
    <button id="dw-ok" style="background:linear-gradient(135deg,#7dd3d3,#10b981);border:none;color:#04060a;padding:6px 16px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">OK</button>
  </div>
</div>
<script>
(function () {
  if (localStorage.getItem('me_demo_welcome_seen')) return;
  const W = {
    ko: '🎬 4-패널 동시 시연. ▶︎ <b>시연 시작</b> 누르면 5분 자동 재생. 우상단 🇰🇷 버튼으로 언어 변경.',
    en: '🎬 4-panel simultaneous demo. Click ▶︎ <b>Start Demo</b> for 5-min auto-replay. Top-right 🇺🇸 button to change language.',
    zh: '🎬 4面板同步演示。点击 ▶︎ <b>开始演示</b> 自动播放 5 分钟。右上角 🇨🇳 按钮切换语言。',
    ja: '🎬 4パネル同時デモ。▶︎ <b>デモ開始</b> で5分自動再生。右上の 🇯🇵 ボタンで言語変更。',
  };
  const lang = (navigator.language || 'ko').slice(0, 2).toLowerCase();
  const t = document.getElementById('demo-welcome');
  const x = document.getElementById('dw-text');
  if (!t || !x) return;
  x.innerHTML = W[lang] || W.ko;
  t.hidden = false;
  document.getElementById('dw-ok')?.addEventListener('click', () => {
    t.hidden = true;
    localStorage.setItem('me_demo_welcome_seen', '1');
  });
  setTimeout(() => {
    if (!t.hidden) { t.hidden = true; localStorage.setItem('me_demo_welcome_seen', '1'); }
  }, 15000);
})();
</script>
<script>
// ==== 4언어 토글 (외국인 시연 대비) ====
const I18N_DEMO = {
  ko: { brand: 'MetroEyes 통합 시연', sub: 'SubwayBEV — 운영자 + 시민 + 디스플레이 양면 가치 사슬', start: '▶︎ 시연 시작', startBody: '<b>시연 시작</b> 버튼을 눌러 5분 전체 흐름을 자동 재생하세요. <span style="opacity:.65;">(잠실 18시 → 폭증 → 분산 → 보상 → 광고 라이브)</span>', flag: '🇰🇷' },
  en: { brand: 'MetroEyes Integrated Demo', sub: 'SubwayBEV — Operator + Citizen + Display Two-sided Value Chain', start: '▶︎ Start Demo', startBody: 'Click <b>Start Demo</b> to auto-replay 5-min full flow. <span style="opacity:.65;">(Jamsil 18:00 → surge → redistribute → reward → live ads)</span>', flag: '🇺🇸' },
  zh: { brand: 'MetroEyes 综合演示', sub: 'SubwayBEV — 运营者 + 市民 + 显示器 双向价值链', start: '▶︎ 开始演示', startBody: '点击 <b>开始演示</b> 自动播放 5 分钟全流程。', flag: '🇨🇳' },
  ja: { brand: 'MetroEyes 統合デモ', sub: 'SubwayBEV — オペレーター + 市民 + ディスプレイ 双方向価値連鎖', start: '▶︎ デモ開始', startBody: '<b>デモ開始</b>ボタンで 5 分全体フロー自動再生。', flag: '🇯🇵' },
};
let _curDemoLang = (navigator.language || 'ko').slice(0, 2).toLowerCase();
if (!I18N_DEMO[_curDemoLang]) _curDemoLang = 'ko';
function applyDemoI18n() {
  const t = I18N_DEMO[_curDemoLang];
  const brand = document.getElementById('brand-text');
  const sub = document.getElementById('brand-sub');
  if (brand) brand.firstChild.nodeValue = t.brand;
  if (sub) sub.textContent = t.sub;
  const startBtn = document.getElementById('start');
  if (startBtn && (startBtn.textContent.indexOf('진행') === -1 && startBtn.textContent.indexOf('Demo') === -1 && startBtn.textContent.indexOf('演示') === -1)) {
    startBtn.textContent = t.start;
  }
  const scen = document.getElementById('scenario');
  if (scen && !window._demoStarted) scen.innerHTML = '▶︎ ' + t.startBody;
  document.getElementById('lang-toggle').textContent = t.flag;
  document.documentElement.lang = _curDemoLang;
}
document.getElementById('lang-toggle')?.addEventListener('click', () => {
  const order = ['ko', 'en', 'zh', 'ja'];
  _curDemoLang = order[(order.indexOf(_curDemoLang) + 1) % 4];
  applyDemoI18n();
});
window.addEventListener('DOMContentLoaded', applyDemoI18n);

// 헤더 라이브 KPI 8s 폴링 (index.html 패턴 동일)
(async function pollDemoKPI() {
  const url = (location.protocol === 'https:'
    ? `https://${location.host}` : `http://localhost:8765`) + '/health';
  try {
    const r = await fetch(url, { cache: 'no-cache' });
    const j = await r.json();
    const im = j.impact;
    if (im && im.total_count > 0) {
      const scen = document.getElementById('scenario');
      if (scen) {
        const fmt = w => w >= 10000 ? `₩${(w/10000).toFixed(1)}만` : `₩${(w||0).toLocaleString()}`;
        scen.innerHTML = `🟢 <b>라이브</b> · 분산 ${im.total_count}명 · ⏱${Math.round(im.saved_min_total)}분 · 💰${fmt(im.value_won)} · ROI ${Math.round(im.roi_x||0)}x`;
      }
    }
  } catch {}
  setTimeout(pollDemoKPI, 8000);
})();

const startBtn = document.getElementById('start');
const timer = document.getElementById('timer');
const stage = document.getElementById('stage');
const scen = document.getElementById('scenario');

function fmtT(ms) {
  const s = Math.floor(ms / 1000);
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
function flash(msg) {
  stage.textContent = msg;
  stage.classList.add('show');
  clearTimeout(stage._t);
  stage._t = setTimeout(() => stage.classList.remove('show'), 3500);
}

// 시연 페이지 안의 iframe ▶︎ 시연 모드 버튼 자동 클릭
function clickInside(iframeId, btnId) {
  try {
    const ifr = document.getElementById(iframeId);
    const doc = ifr.contentDocument;
    const btn = doc && doc.getElementById(btnId);
    if (btn) btn.click();
  } catch (e) { /* cross-origin or not loaded */ }
}

// 환승 흐름 overlay — 4초 표시
function showTransferOverlay() {
  let ov = document.getElementById('transfer-overlay');
  if (!ov) {
    ov = document.createElement('div');
    ov.id = 'transfer-overlay';
    ov.style.cssText = 'position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:9999;background:rgba(4,6,10,0.96);border:2px solid #f59e0b;border-radius:14px;padding:18px;box-shadow:0 12px 40px rgba(0,0,0,0.6);max-width:780px;text-align:center;opacity:0;transition:opacity .35s';
    ov.innerHTML = `
      <div style="font:600 13px sans-serif;color:#f59e0b;letter-spacing:1.4px;margin-bottom:10px">🔀 환승역 호선 간 비대칭 — 37 환승역 분석</div>
      <img src="figs/transfer_stations.png" alt="환승 흐름" style="max-width:740px;width:100%;border-radius:8px"/>
      <div style="font:11px sans-serif;color:#fff;margin-top:10px;line-height:1.5">
        <span style="color:#f59e0b">충무로 +1.56</span> ·
        <span style="color:#f59e0b">연신내 +1.44</span> ·
        분산 인센티브 환승역 집중 → 양 호선 동시 절감
      </div>
    `;
    document.body.appendChild(ov);
  }
  ov.style.opacity = '1';
  setTimeout(() => { ov.style.opacity = '0'; setTimeout(() => ov.remove(), 400); }, 5000);
}

// 분산 효과 결과 overlay — 4초 표시
function showDispersionOverlay() {
  let ov = document.getElementById('dispersion-overlay');
  if (!ov) {
    ov = document.createElement('div');
    ov.id = 'dispersion-overlay';
    ov.style.cssText = 'position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);z-index:9999;background:rgba(4,6,10,0.96);border:2px solid #7dd3d3;border-radius:14px;padding:18px;box-shadow:0 12px 40px rgba(0,0,0,0.6);max-width:780px;text-align:center;opacity:0;transition:opacity .35s';
    ov.innerHTML = `
      <div style="font:600 13px sans-serif;color:#7dd3d3;letter-spacing:1.4px;margin-bottom:10px">📈 실 데이터 분산 효과 — 28일 평균 1~9호선</div>
      <img src="figs/dispersion_sim.png" alt="분산 효과" style="max-width:740px;width:100%;border-radius:8px"/>
      <div style="font:11px sans-serif;color:#fff;margin-top:10px;line-height:1.5">
        <span style="color:#ff5e57">σ −9.0%</span> ·
        <span style="color:#f59e0b">피크 −13.5%</span> ·
        <span style="color:#10b981">비피크 +5.6%</span> ·
        <span style="color:#7dd3d3">피크/비피크 1.78→1.46</span>
      </div>
    `;
    document.body.appendChild(ov);
  }
  ov.style.opacity = '1';
  setTimeout(() => { ov.style.opacity = '0'; setTimeout(() => ov.remove(), 400); }, 5000);
}

const SCRIPT = [
  // [ms, banner, action]
  [0,     '🎬 잠실역 18시 — 평상 운영',                     null],
  [5000,  '📊 광고 단가 라이브 시연 — 12 POI 분 단위 변동',   () => clickInside('if-ad', 'demo-trigger')],
  [12000, '🚨 운영자 시연 — 무임/분실/응급/이상/분산 5종 30s', () => clickInside('if-op', 'demo-trigger')],
  [45000, '📷 실 카메라 BEV 시연 — 응급 골든타임 + AED 자동 안내', () => clickInside('if-cam', 'demo-trigger')],
  [80000, '📱 시민 PWA — 분산 인센티브 보상 시연 (₩200 차등)', null],
  [120000,'🪙 backend krw 누적 → 운영자 ROI 라이브 갱신',     null],
  [180000,'🚨 incident_summary broadcast → 모든 페이지 동기화', null],
  [220000,'📈 실 데이터 분산 효과 — σ −9% / 피크 −13.5% / 비피크 +5.6%', showDispersionOverlay],
  [232000,'🔀 환승역 비대칭 — 충무로 4호선 vs 3호선 +1.56 (분산 우선)', showTransferOverlay],
  [248000,'⏱  5분 시연 종료 — pitch.html ROI 슬라이더로 마무리', null],
];

let started = false;
startBtn.addEventListener('click', () => {
  if (started) return;
  started = true;
  startBtn.disabled = true;
  startBtn.textContent = '시연 진행 중...';
  scen.innerHTML = '<b>시연 진행 중</b> — 운영자/시민/광고/실카메라 4-패널 동시 모니터링';
  const t0 = Date.now();
  SCRIPT.forEach(([ms, msg, act]) => {
    setTimeout(() => {
      flash(msg);
      if (act) try { act(); } catch {}
    }, ms);
  });
  // timer + progress bar
  const tk = setInterval(() => {
    const dt = Date.now() - t0;
    timer.textContent = fmtT(dt);
    const bar = document.getElementById('demo-bar');
    if (bar) bar.style.width = Math.min(100, dt / (5*60*1000) * 100) + '%';
    if (dt > 5 * 60 * 1000) {
      clearInterval(tk);
      startBtn.disabled = false;
      startBtn.textContent = '▶︎ 다시 재생';
      started = false;
      scen.innerHTML = '✅ <b>시연 종료</b> — 다시 재생 또는 개별 패널 자유 조작';
      if (bar) setTimeout(() => bar.style.width = '0', 1500);
    }
  }, 250);
});
</script>
</body>
</html>
