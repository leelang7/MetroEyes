<style>
  :root {
    --bg: #0a0a0e;
    --panel: #14141a;
    --line: rgba(125,211,211,0.16);
    --text: #e8e8ee;
    --muted: #8a8a96;
    --accent: #7dd3d3;
    --bus: #f97316;
    --realcam: #ef4444;
    --ads: #10b981;
  }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--text); font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; overflow: hidden; }
  header {
    display: flex; align-items: center; gap: 16px; padding: 8px 16px; height: 44px;
    background: linear-gradient(135deg, rgba(125,211,211,0.10), rgba(20,20,26,0.85));
    border-bottom: 1px solid var(--line);
    position: relative;
  }
  #demo-bar {
    position: absolute; left: 0; bottom: 0; height: 2px; width: 0;
    background: linear-gradient(90deg, var(--accent), #38bdf8);
    transition: width .25s linear; box-shadow: 0 0 8px var(--accent);
  }
  header .brand { font-size: 14px; font-weight: 800; letter-spacing: .8px; color: var(--accent); }
  header .brand small { display: block; font-size: 13px; letter-spacing: 1.2px; color: var(--muted); font-weight: 500; }
  header .scenario { flex: 1; font-size: 13px; color: var(--muted); }
  header .scenario b { color: var(--text); font-weight: 700; }
  header .timer { font-family: 'Roboto Mono', monospace; font-size: 14px; color: var(--accent); padding: 4px 10px; background: rgba(125,211,211,.10); border: 1px solid var(--line); border-radius: 6px; min-width: 64px; text-align: center; }
  header button {
    padding: 6px 14px; background: linear-gradient(135deg, #f59e0b, #ef4444);
    color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 800;
    cursor: pointer; letter-spacing: .4px;
  }
  header button:disabled { opacity: .55; cursor: not-allowed; }
  main {
    display: grid; grid-template-columns: 1.5fr 1fr 1.1fr; gap: 8px;
    padding: 8px; height: calc(100vh - 60px);
  }
  .panel {
    position: relative; background: var(--panel); border: 1px solid var(--line);
    border-radius: 10px; overflow: hidden;
  }
  .panel-head {
    position: absolute; top: 0; left: 0; right: 0; height: 28px;
    display: flex; align-items: center; gap: 8px; padding: 0 12px;
    background: rgba(0,0,0,.4); backdrop-filter: blur(6px);
    font-size: 13px; letter-spacing: .8px; text-transform: uppercase; z-index: 5;
    border-bottom: 1px solid var(--line);
  }
  .panel-head .led {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent); box-shadow: 0 0 8px var(--accent);
    animation: pulse 1.6s ease-in-out infinite;
  }
  .panel-head.bus .led { background: var(--bus); box-shadow: 0 0 8px var(--bus); }
  .panel-head.cam .led { background: var(--realcam); box-shadow: 0 0 8px var(--realcam); }
  .panel-head.ads .led { background: var(--ads); box-shadow: 0 0 8px var(--ads); }
  .panel-head.app .led { background: #f59e0b; box-shadow: 0 0 8px #f59e0b; }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: .55; transform: scale(.85); }
  }
  iframe {
    width: 100%; height: 100%; border: 0; display: block;
    transform-origin: top left;
  }
  .col-stack {
    display: grid; grid-template-rows: 1.1fr 0.95fr 0.7fr; gap: 8px;
    height: 100%;
  }
  .col-stack-2 {
    display: grid; grid-template-rows: 1.1fr 1fr; gap: 8px;
    height: 100%;
  }
  .stage-banner {
    position: absolute; left: 50%; top: 38px; transform: translateX(-50%);
    background: linear-gradient(135deg, var(--accent), #38bdf8); color: #0a0a0e;
    padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 800;
    letter-spacing: .4px; box-shadow: 0 8px 24px rgba(125,211,211,.4);
    opacity: 0; transition: opacity .35s, transform .35s; pointer-events: none; z-index: 100;
  }
  .stage-banner.show { opacity: 1; transform: translateX(-50%) translateY(0); }

// ==== 4언어 토글 (외국인 시연 대비) ====
const I18N_DEMO = {
  ko: { brand: '통합 시연', sub: '운영자 + 시민 + 디스플레이 양면 가치 사슬', start: '▶︎ 시연 시작', startBody: '<b>시연 시작</b> 버튼을 눌러 5분 전체 흐름을 자동 재생하세요. <span style="opacity:.65;">(잠실 18시 → 폭증 → 분산 → 보상 → 광고 라이브)</span>', flag: '🇰🇷' },

};
let _curDemoLang = (navigator.language || 'ko').slice(0, 2).toLowerCase();
if (!I18N_DEMO[_curDemoLang]) _curDemoLang = 'ko';
function applyDemoI18n() {
  const t = I18N_DEMO[_curDemoLang];
  const brand = document.getElementById('brand-text');
  const sub = document.getElementById('brand-sub');
  if (brand) brand.firstChild.nodeValue = t.brand;
  if (sub) sub.textContent = t.sub;
  const startBtn = document.getElementById('start');
  if (startBtn && (startBtn.textContent.indexOf('진행') === -1 && startBtn.textContent.indexOf('Demo') === -1 && startBtn.textContent.indexOf('演示') === -1)) {
    startBtn.textContent = t.start;
  }
  const scen = document.getElementById('scenario');
  if (scen && !window._demoStarted) scen.innerHTML = '▶︎ ' + t.startBody;
  document.getElementById('lang-toggle').textContent = t.flag;
  document.documentElement.lang = _curDemoLang;
}
document.getElementById('lang-toggle')?.addEventListener('click', () => {
  const order = ['ko', 'en', 'zh', 'ja'];
  _curDemoLang = order[(order.indexOf(_curDemoLang) + 1) % 4];
  applyDemoI18n();
});
window.addEventListener('DOMContentLoaded', applyDemoI18n);

// 헤더 라이브 KPI 8s 폴링 (index.html 패턴 동일)
(async function pollDemoKPI() {
  const url = window.METROEYES_BACKEND + '/health';
  try {
    const r = await fetch(url, { cache: 'no-cache' });
    const j = await r.json();
    const im = j.impact;
    if (im && im.total_count > 0) {
      const fmt = w => w >= 100000000 ? `₩${(w/100000000).toFixed(2)}억` : w >= 10000 ? `₩${(w/10000).toFixed(1)}만` : `₩${(w||0).toLocaleString()}`;
      // 헤더 impact 카운터 갱신
      const di = document.getElementById('demo-impact');
      if (di) {
        di.style.display = 'flex'; di.hidden = false;
        document.getElementById('dh-cnt').textContent = im.total_count.toLocaleString();
        document.getElementById('dh-min').textContent = Math.round(im.saved_min_total).toLocaleString();
        document.getElementById('dh-val').textContent = fmt(im.value_won);
        document.getElementById('dh-roi').textContent = Math.round(im.roi_x || 0) + 'x';
      }
      // scenario 텍스트 갱신 (시연 시작 전만)
      if (!window._demoStarted) {
        const scen = document.getElementById('scenario');
        if (scen) scen.innerHTML = `🟢 <b>라이브</b> · 분산 ${im.total_count.toLocaleString()}명 · ⏱${Math.round(im.saved_min_total).toLocaleString()}분 · 💰${fmt(im.value_won)} · ROI ${Math.round(im.roi_x||0)}x`;
      }
    }
  } catch {}
  setTimeout(pollDemoKPI, 8000);
})();

function fmtT(ms) {
  const s = Math.floor(ms / 1000);
  return `${String(Math.floor(s/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}
function flash(msg) {
  stage.textContent = msg;
  stage.classList.add('show');
  clearTimeout(stage._t);
  stage._t = setTimeout(() => stage.classList.remove('show'), 3500);
}

// 시연 페이지 안의 iframe ▶︎ 시연 모드 버튼 자동 클릭
function clickInside(iframeId, btnId) {
  try {
    const ifr = document.getElementById(iframeId);
    const doc = ifr.contentDocument;
    const btn = doc && doc.getElementById(btnId);
    if (btn) btn.click();
  } catch (e) { /* cross-origin or not loaded */ }
}

      flash(msg);

    }, ms);
  });
  // timer + progress bar
  const tk = setInterval(() => {
    const dt = Date.now() - t0;
    timer.textContent = fmtT(dt);
    const bar = document.getElementById('demo-bar');
    if (bar) bar.style.width = Math.min(100, dt / (5*60*1000) * 100) + '%';

      clearInterval(tk);

});
